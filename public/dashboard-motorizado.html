<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli7e — Motorizados (En Construcción)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --g1: #00DD00;
            --g2: #00BB00;
            --g3: #007700;
            --bg: #060B06;
            --card: #0F180F;
            --border: rgba(0, 221, 0, 0.2);
            --text: #E4F5E4;
            --muted: #7A9A7A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(0, 119, 0, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 20%, rgba(0, 221, 0, 0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(0, 221, 0, 0.06) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        .page { position: relative; z-index: 1; text-align: center; }

        /* ══════════════════════════════════════════════
           ANIMATED SCENE
           ══════════════════════════════════════════════ */
        .scene {
            position: relative;
            width: 420px;
            height: 320px;
            margin: 0 auto 30px;
        }

        /* ── Floor / Shadow ──────────────────────── */
        .floor {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 360px;
            height: 14px;
            background: radial-gradient(ellipse, rgba(0,221,0,.12) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* ── Motorcycle ──────────────────────────── */
        .moto {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-30%);
            animation: motoShake .4s ease-in-out infinite alternate;
        }
        @keyframes motoShake {
            0% { transform: translateX(-30%) rotate(0deg); }
            100% { transform: translateX(-30%) rotate(.5deg) translateY(-1px); }
        }

        /* Moto body */
        .moto-body {
            width: 140px;
            height: 70px;
            background: linear-gradient(135deg, #1a3a1a, #0d260d);
            border-radius: 8px 30px 5px 5px;
            border: 2px solid var(--g3);
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,.4), inset 0 2px 0 rgba(0,221,0,.1);
        }
        .moto-body::before {
            content: 'ELI7E';
            position: absolute;
            top: 14px;
            left: 20px;
            font-size: .6rem;
            font-weight: 800;
            color: var(--g1);
            letter-spacing: 2px;
        }
        /* Handlebar */
        .moto-body::after {
            content: '';
            position: absolute;
            top: -18px;
            right: -6px;
            width: 6px;
            height: 30px;
            background: linear-gradient(to bottom, #444, #222);
            border-radius: 3px;
            transform: rotate(-15deg);
        }
        /* Seat */
        .seat {
            position: absolute;
            top: -12px;
            left: 15px;
            width: 50px;
            height: 14px;
            background: #1a1a1a;
            border-radius: 10px 10px 3px 3px;
            border: 1px solid #333;
        }
        /* Wheels */
        .wheel {
            position: absolute;
            bottom: -22px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 4px solid #333;
            background: radial-gradient(circle, #111 30%, #222 60%, #333 100%);
            box-shadow: inset 0 0 8px rgba(0,0,0,.6);
        }
        .wheel::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            border: 2px solid #666;
        }
        .wheel-front { right: -10px; }
        .wheel-rear { left: -8px; }

        /* Headlight glow */
        .headlight {
            position: absolute;
            top: 8px;
            right: -4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffff88, #ffcc00);
            box-shadow: 0 0 15px rgba(255,204,0,.5), 0 0 30px rgba(255,204,0,.2);
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 80%, 100% { opacity: 1; }
            90% { opacity: .3; }
        }

        /* ── Character (Jackelin) ────────────────── */
        .character {
            position: absolute;
            bottom: 36px;
            left: 14%;
            animation: bodyBob .8s ease-in-out infinite alternate;
        }
        @keyframes bodyBob {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-3px) rotate(-1deg); }
        }

        /* Head */
        .head {
            position: relative;
            width: 42px;
            height: 46px;
            margin: 0 auto -4px;
        }
        .face {
            width: 42px;
            height: 42px;
            background: linear-gradient(170deg, #FDDCB5, #F5C89A);
            border-radius: 50%;
            position: relative;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }
        /* Eyes */
        .eye {
            position: absolute;
            width: 6px;
            height: 7px;
            background: #2a1a0a;
            border-radius: 50%;
            top: 17px;
            animation: eyeBlink 3s ease-in-out infinite;
        }
        .eye-l { left: 11px; }
        .eye-r { right: 11px; }
        @keyframes eyeBlink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
        /* Glasses */
        .glasses {
            position: absolute;
            top: 13px;
            left: 4px;
            width: 34px;
            height: 14px;
            border: 2px solid #333;
            border-radius: 6px;
            z-index: 3;
        }
        .glasses::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 2px;
            background: #333;
        }
        /* Smile */
        .mouth {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 5px;
            border-bottom: 2px solid #c97a5a;
            border-radius: 0 0 50% 50%;
        }
        /* Hair - long black */
        .hair {
            position: absolute;
            top: -3px;
            left: -5px;
            width: 52px;
            height: 30px;
            background: #111;
            border-radius: 50% 50% 0 0;
            z-index: 3;
        }
        /* Long hair strands flowing down */
        .hair-long {
            position: absolute;
            top: 18px;
            width: 10px;
            height: 80px;
            background: linear-gradient(to bottom, #111, #1a1a1a);
            border-radius: 0 0 8px 8px;
            z-index: 1;
        }
        .hair-l {
            left: -4px;
            transform: rotate(5deg);
            animation: hairSway 2s ease-in-out infinite alternate;
        }
        .hair-r {
            right: -3px;
            transform: rotate(-3deg);
            animation: hairSway 2s ease-in-out infinite alternate-reverse;
        }
        .hair-back {
            left: 4px;
            width: 36px;
            height: 100px;
            border-radius: 0 0 20px 20px;
            z-index: 0;
            animation: hairSway 2.5s ease-in-out infinite alternate;
        }
        @keyframes hairSway {
            0% { transform: rotate(-2deg) translateX(0); }
            100% { transform: rotate(3deg) translateX(2px); }
        }

        /* Body / Torso */
        .torso {
            width: 44px;
            height: 48px;
            background: linear-gradient(170deg, #1a4a1a, #0d330d);
            border-radius: 8px 8px 4px 4px;
            position: relative;
            margin: 0 auto;
            border: 1px solid rgba(0,221,0,.15);
        }
        /* Name tag */
        .nametag {
            position: absolute;
            top: 6px;
            left: 4px;
            background: #fff;
            color: #222;
            font-size: .32rem;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 2px;
            letter-spacing: .5px;
        }

        /* Arms */
        .arm {
            position: absolute;
            width: 12px;
            height: 46px;
            background: linear-gradient(170deg, #1a4a1a, #0d330d);
            border-radius: 6px;
            top: 0;
            transform-origin: top center;
        }
        .arm-l {
            left: -10px;
            animation: armWork .6s ease-in-out infinite alternate;
        }
        .arm-r {
            right: -10px;
            animation: armWork .6s ease-in-out infinite alternate-reverse;
        }
        @keyframes armWork {
            0% { transform: rotate(25deg) translateY(2px); }
            100% { transform: rotate(40deg) translateY(-2px); }
        }

        /* Hand with skin color at end of arm */
        .hand {
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: #F5C89A;
            border-radius: 50%;
        }

        /* Wrench in right hand */
        .wrench {
            position: absolute;
            bottom: -18px;
            right: -20px;
            font-size: 1.1rem;
            animation: wrenchTurn .4s ease-in-out infinite alternate;
            transform-origin: top left;
        }
        @keyframes wrenchTurn {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(20deg); }
        }

        /* Legs */
        .legs {
            display: flex;
            gap: 4px;
            justify-content: center;
        }
        .leg {
            width: 14px;
            height: 28px;
            background: #1a3a5a;
            border-radius: 4px 4px 6px 6px;
        }
        .boot {
            width: 18px;
            height: 8px;
            background: #333;
            border-radius: 3px 6px 3px 3px;
            margin-top: -1px;
        }

        /* ── Animated Sparks ─────────────────────── */
        .spark-container {
            position: absolute;
            top: 45%;
            left: 55%;
        }
        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--g1);
            box-shadow: 0 0 6px var(--g1), 0 0 12px rgba(0,221,0,.4);
        }
        .spark:nth-child(1) { animation: sparkFly1 .7s ease-out infinite; }
        .spark:nth-child(2) { animation: sparkFly2 .7s ease-out infinite .15s; }
        .spark:nth-child(3) { animation: sparkFly3 .7s ease-out infinite .3s; }
        .spark:nth-child(4) { animation: sparkFly4 .7s ease-out infinite .1s; width:3px; height:3px; }
        .spark:nth-child(5) { animation: sparkFly5 .7s ease-out infinite .4s; width:2px; height:2px; }
        .spark:nth-child(6) { animation: sparkFly6 .7s ease-out infinite .2s; width:3px; height:3px; background:#ffcc00; box-shadow: 0 0 6px #ffcc00; }

        @keyframes sparkFly1 {
            0% { transform: translate(0,0) scale(1); opacity:1; }
            100% { transform: translate(30px,-50px) scale(0); opacity:0; }
        }
        @keyframes sparkFly2 {
            0% { transform: translate(0,0) scale(1); opacity:1; }
            100% { transform: translate(-20px,-45px) scale(0); opacity:0; }
        }
        @keyframes sparkFly3 {
            0% { transform: translate(0,0) scale(1); opacity:1; }
            100% { transform: translate(40px,-30px) scale(0); opacity:0; }
        }
        @keyframes sparkFly4 {
            0% { transform: translate(0,0) scale(1); opacity:1; }
            100% { transform: translate(-10px,-60px) scale(0); opacity:0; }
        }
        @keyframes sparkFly5 {
            0% { transform: translate(0,0) scale(1); opacity:1; }
            100% { transform: translate(25px,-55px) scale(0); opacity:0; }
        }
        @keyframes sparkFly6 {
            0% { transform: translate(0,0) scale(1); opacity:1; }
            100% { transform: translate(-30px,-35px) scale(0); opacity:0; }
        }

        /* ── Scattered Tools ─────────────────────── */
        .tool {
            position: absolute;
            bottom: 10px;
            font-size: 1.1rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,.4));
        }
        .tool-1 { left: 12%; animation: toolWobble 3s ease-in-out infinite; }
        .tool-2 { left: 25%; bottom: 6px; animation: toolWobble 3s ease-in-out infinite .5s; }
        .tool-3 { right: 8%; animation: toolWobble 3s ease-in-out infinite 1s; }
        .tool-4 { right: 22%; bottom: 8px; font-size: .9rem; animation: toolWobble 3s ease-in-out infinite 1.5s; }

        @keyframes toolWobble {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg) translateY(-2px); }
        }

        /* ── Floating Gears ──────────────────────── */
        .gear {
            position: fixed;
            color: rgba(0, 221, 0, 0.05);
            font-size: 4rem;
            animation: gearSpin 10s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        .gear:nth-child(1) { top: 8%; left: 5%; font-size: 5rem; animation-duration: 12s; }
        .gear:nth-child(2) { bottom: 12%; right: 6%; font-size: 3.5rem; animation-duration: 15s; animation-direction: reverse; }
        .gear:nth-child(3) { top: 60%; left: 8%; font-size: 6rem; animation-duration: 18s; }
        .gear:nth-child(4) { top: 15%; right: 12%; font-size: 3rem; animation-duration: 9s; animation-direction: reverse; }

        @keyframes gearSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ══ TEXT AREA ════════════════════════════ */
        .title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--g1) 0%, #CCFFCC 50%, var(--g1) 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
            margin-bottom: 8px;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: .95rem;
            color: var(--muted);
            margin-bottom: 24px;
        }

        .progress-wrap {
            width: 280px;
            margin: 0 auto 8px;
            height: 6px;
            background: rgba(0,221,0,.08);
            border-radius: 999px;
            border: 1px solid rgba(0,221,0,.12);
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, var(--g2), var(--g1));
            border-radius: 999px;
            animation: progressPulse 3s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(0,221,0,.3);
        }
        @keyframes progressPulse {
            0% { width: 25%; }
            50% { width: 45%; }
            100% { width: 25%; }
        }
        .progress-txt {
            font-size: .75rem;
            color: var(--g1);
            font-weight: 600;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            padding: 12px 28px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            text-decoration: none;
        }
        .btn-back:hover {
            border-color: var(--g1);
            box-shadow: 0 0 20px rgba(0,221,0,.15);
            transform: translateY(-2px);
        }

        /* ── Speech Bubble ───────────────────────── */
        .bubble {
            position: absolute;
            top: -10px;
            left: 5%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 14px;
            font-size: .72rem;
            color: var(--g1);
            animation: bubblePop 4s ease-in-out infinite;
            white-space: nowrap;
        }
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 30px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid var(--border);
        }
        @keyframes bubblePop {
            0%, 100% { opacity: 1; transform: translateY(0); }
            50% { opacity: .7; transform: translateY(-4px); }
        }

        @media (max-width: 480px) {
            .scene { width: 320px; height: 260px; transform: scale(.85); }
        }
    </style>
</head>

<body>

    <div class="gear">⚙️</div>
    <div class="gear">⚙️</div>
    <div class="gear">⚙️</div>
    <div class="gear">⚙️</div>

    <div class="page">

        <!-- ══ ANIMATED SCENE ══ -->
        <div class="scene">

            <!-- Speech bubble -->
            <div class="bubble">🔧 Ya casi queda lista! 🛵</div>

            <!-- Floor shadow -->
            <div class="floor"></div>

            <!-- Tools on ground -->
            <span class="tool tool-1">🔩</span>
            <span class="tool tool-2">🪛</span>
            <span class="tool tool-3">⚡</span>
            <span class="tool tool-4">🔧</span>

            <!-- Motorcycle -->
            <div class="moto">
                <div class="seat"></div>
                <div class="moto-body"></div>
                <div class="headlight"></div>
                <div class="wheel wheel-front"></div>
                <div class="wheel wheel-rear"></div>
            </div>

            <!-- Sparks -->
            <div class="spark-container">
                <div class="spark"></div>
                <div class="spark"></div>
                <div class="spark"></div>
                <div class="spark"></div>
                <div class="spark"></div>
                <div class="spark"></div>
            </div>

            <!-- Character: Jackelin -->
            <div class="character">
                <div class="head">
                    <div class="hair"></div>
                    <div class="hair-long hair-l"></div>
                    <div class="hair-long hair-r"></div>
                    <div class="hair-long hair-back"></div>
                    <div class="face">
                        <div class="eye eye-l"></div>
                        <div class="eye eye-r"></div>
                        <div class="glasses"></div>
                        <div class="mouth"></div>
                    </div>
                </div>
                <div class="torso">
                    <div class="nametag">JACKELIN</div>
                    <div class="arm arm-l"><div class="hand"></div></div>
                    <div class="arm arm-r">
                        <div class="hand"></div>
                        <div class="wrench">🔧</div>
                    </div>
                </div>
                <div class="legs">
                    <div><div class="leg"></div><div class="boot"></div></div>
                    <div><div class="leg"></div><div class="boot"></div></div>
                </div>
            </div>

        </div>

        <!-- Text -->
        <div class="title">🛵 Módulo Motorizados</div>
        <div class="subtitle">Jackelin está construyendo algo increíble...</div>

        <div class="progress-wrap">
            <div class="progress-fill"></div>
        </div>
        <div class="progress-txt">En construcción... 35%</div>

        <a href="/" class="btn-back">← Volver al inicio</a>
    </div>

</body>
</html>
