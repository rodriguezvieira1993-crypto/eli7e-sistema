<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli7e — Acceso al Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --g1: #00DD00;
            --g2: #00BB00;
            --g3: #007700;
            --bg: #040804;
            --card: rgba(12, 22, 12, 0.7);
            --card2: #141F14;
            --border: rgba(0, 221, 0, 0.15);
            --text: #E4F5E4;
            --muted: #7A9A7A;
            --err: #FF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ─── SPLIT LAYOUT ─────────────────────────── */
        .split {
            display: flex;
            min-height: 100vh;
        }

        /* ─── LEFT: HERO ───────────────────────────── */
        .hero {
            flex: 0 0 55%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background:
                radial-gradient(ellipse 80% 60% at 50% 60%, rgba(0, 119, 0, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 30% 30%, rgba(0, 221, 0, 0.06) 0%, transparent 60%);
        }

        /* Grid background */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 221, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 221, 0, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 70%);
        }

        /* Road lines at bottom */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background:
                repeating-linear-gradient(90deg,
                    transparent 0px, transparent 60px,
                    rgba(0, 221, 0, 0.15) 60px, rgba(0, 221, 0, 0.15) 100px,
                    transparent 100px, transparent 160px);
            mask-image: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
        }

        /* Speed particles container */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--g1), transparent);
            border-radius: 1px;
            opacity: 0;
        }

        /* Neon glow orb behind logo */
        .glow-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 221, 0, 0.08) 0%, transparent 70%);
            pointer-events: none;
            filter: blur(40px);
        }

        /* Logo */
        .hero-logo {
            position: relative;
            z-index: 2;
            margin-bottom: 16px;
        }

        .hero-logo img {
            height: 180px;
            filter: drop-shadow(0 0 40px rgba(0, 221, 0, 0.5)) drop-shadow(0 0 80px rgba(0, 221, 0, 0.2));
            mix-blend-mode: lighten;
        }

        /* Speed trail behind logo */
        .speed-trail {
            position: absolute;
            top: 50%;
            right: 60%;
            width: 200px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--g1));
            border-radius: 2px;
            opacity: 0;
            filter: blur(1px);
            transform: translateY(-50%);
        }

        .speed-trail:nth-child(2) {
            top: 40%;
            width: 150px;
            right: 65%;
            height: 2px;
        }

        .speed-trail:nth-child(3) {
            top: 62%;
            width: 120px;
            right: 55%;
            height: 2px;
        }

        /* Brand text */
        .hero-brand {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .hero-title {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            background: linear-gradient(135deg, #FFFFFF 0%, var(--g1) 40%, #CCFFCC 60%, var(--g1) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            margin-bottom: 8px;
        }

        .hero-title-glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            color: var(--g1);
            filter: blur(20px);
            opacity: 0.3;
            pointer-events: none;
            white-space: nowrap;
        }

        .hero-tagline {
            font-size: 0.88rem;
            font-weight: 400;
            color: var(--muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .hero-stat {
            display: flex;
            gap: 32px;
            margin-top: 48px;
            position: relative;
            z-index: 2;
        }

        .stat-item {
            text-align: center;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--g1);
        }

        .stat-lbl {
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Divider line between hero and form */
        .divider {
            position: absolute;
            right: 0;
            top: 10%;
            bottom: 10%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--g3), var(--g1), var(--g3), transparent);
            z-index: 5;
        }

        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -4px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--g1);
            box-shadow: 0 0 12px var(--g1), 0 0 24px rgba(0, 221, 0, 0.4);
            transform: translateY(-50%);
        }

        /* ─── RIGHT: LOGIN FORM ────────────────────── */
        .login-side {
            flex: 0 0 45%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            z-index: 2;
        }

        /* Subtle dots background */
        .login-side::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(0, 221, 0, 0.04) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 380px;
        }

        .login-header {
            margin-bottom: 32px;
        }

        .login-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-header p {
            font-size: 0.82rem;
            color: var(--muted);
        }

        /* Glass card */
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow:
                0 0 60px rgba(0, 221, 0, 0.05),
                0 24px 48px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(0, 221, 0, 0.08);
        }

        /* Form */
        .field {
            margin-bottom: 20px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        label .icon {
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            background: rgba(14, 24, 14, 0.8);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.92rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--g1);
            box-shadow: 0 0 0 3px rgba(0, 221, 0, 0.08), 0 0 20px rgba(0, 221, 0, 0.06);
        }

        input::placeholder {
            color: rgba(122, 154, 122, 0.6);
        }

        /* Error */
        .error-msg {
            background: rgba(255, 68, 68, 0.08);
            border: 1px solid rgba(255, 68, 68, 0.25);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: var(--err);
            margin-bottom: 16px;
            display: none;
        }

        .error-msg.show { display: block; }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--g1) 0%, var(--g3) 100%);
            color: #000;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
            transition: transform 0.6s;
            transform: translateX(-100%);
        }

        .btn-login:hover::before {
            transform: translateX(100%);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner { display: none; }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: inline; }

        /* Roles */
        .roles-hint {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 221, 0, 0.08);
        }

        .roles-hint p {
            font-size: 0.7rem;
            color: var(--muted);
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .role-pills {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .role-pill {
            background: rgba(14, 24, 14, 0.6);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 16px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-pill:hover {
            border-color: var(--g2);
            color: var(--g1);
            background: rgba(0, 221, 0, 0.06);
        }

        .role-pill.moto {
            border-color: rgba(0, 150, 255, 0.25);
            color: #5599CC;
        }

        .role-pill.moto:hover {
            border-color: #0096ff;
            color: #0096ff;
            background: rgba(0, 150, 255, 0.06);
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.68rem;
            color: rgba(122, 154, 122, 0.35);
            letter-spacing: 0.5px;
        }

        /* ─── RESPONSIVE ───────────────────────────── */
        @media (max-width: 900px) {
            .split { flex-direction: column; }
            .hero {
                flex: none;
                height: 35vh;
                min-height: 260px;
            }
            .hero-logo img { height: 100px; }
            .hero-title { font-size: 2.8rem; }
            .hero-title-glow { font-size: 2.8rem; }
            .hero-stat { display: none; }
            .divider { display: none; }
            .login-side {
                flex: 1;
                padding: 24px;
            }
            .hero::after { display: none; }
        }

        @media (max-width: 480px) {
            .hero { height: 28vh; min-height: 200px; }
            .hero-logo img { height: 70px; }
            .hero-title { font-size: 2rem; }
            .hero-title-glow { font-size: 2rem; }
            .hero-tagline { font-size: 0.7rem; letter-spacing: 2px; }
            .glass-card { padding: 24px 20px; }
        }
    </style>
</head>

<body>

    <div class="split">

        <!-- ─── LEFT: HERO ──────────────────────── -->
        <div class="hero" id="hero">
            <div class="particles" id="particles"></div>
            <div class="glow-orb" id="glowOrb"></div>

            <div class="hero-logo" id="heroLogo">
                <div class="speed-trail"></div>
                <div class="speed-trail"></div>
                <div class="speed-trail"></div>
                <img src="img/eli7e_logo.png" alt="Eli7e" onerror="this.style.display='none'">
            </div>

            <div class="hero-brand" id="heroBrand">
                <div style="position:relative;display:inline-block;">
                    <div class="hero-title-glow">Eli7e</div>
                    <div class="hero-title">Eli7e</div>
                </div>
                <div class="hero-tagline">Sistema de Gestion Operativa</div>
            </div>

            <div class="hero-stat" id="heroStats">
                <div class="stat-item">
                    <div class="stat-val" id="stat-servicios">24/7</div>
                    <div class="stat-lbl">Operativo</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val">5</div>
                    <div class="stat-lbl">Zonas</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val">< 3s</div>
                    <div class="stat-lbl">Respuesta</div>
                </div>
            </div>

            <div class="divider" id="divider"></div>
        </div>

        <!-- ─── RIGHT: LOGIN ────────────────────── -->
        <div class="login-side">
            <div class="login-wrapper" id="loginWrap">

                <div class="login-header" id="loginHeader">
                    <h2>Bienvenido de vuelta</h2>
                    <p>Ingresa tus credenciales para acceder al centro de operaciones</p>
                </div>

                <div class="glass-card" id="glassCard">
                    <div class="error-msg" id="errorMsg"></div>

                    <form id="loginForm">
                        <div class="field">
                            <label for="email"><span class="icon">✉</span> Correo electrónico</label>
                            <input type="email" id="email" placeholder="usuario@eli7e.com" autocomplete="email" required>
                        </div>
                        <div class="field">
                            <label for="password"><span class="icon">🔒</span> Contraseña</label>
                            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                        </div>

                        <button type="submit" class="btn-login" id="btnLogin">
                            <span class="btn-text">Ingresar al Sistema</span>
                            <span class="spinner">Verificando...</span>
                        </button>
                    </form>

                    <div class="roles-hint">
                        <p>Acceso rápido (demo)</p>
                        <div class="role-pills">
                            <div class="role-pill" onclick="fillDemo('admin')">👑 Admin</div>
                            <div class="role-pill" onclick="fillDemo('cc')">📞 Call Center</div>
                            <div class="role-pill" onclick="fillDemo('cont')">💼 Contable</div>
                            <div class="role-pill moto" onclick="window.location.href='dashboard-motorizado.html'">🛵 Motorizados</div>
                        </div>
                    </div>
                </div>

                <div class="login-footer">Eli7e © 2026 · Puerto Ordaz, Venezuela</div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script>
        // ─── CONFIG ─────────────────────────────────
        const DEMO = {
            admin: { email: 'admin@eli7e.com', password: 'eli7e2026' },
            cc: { email: 'callcenter@eli7e.com', password: 'eli7e2026' },
            cont: { email: 'contable@eli7e.com', password: 'eli7e2026' },
        };

        function fillDemo(rol) {
            document.getElementById('email').value = DEMO[rol].email;
            document.getElementById('password').value = DEMO[rol].password;
            document.getElementById('errorMsg').classList.remove('show');
        }

        const DASHBOARD = {
            admin: 'dashboard-admin.html',
            call_center: 'dashboard-callcenter.html',
            contable: 'dashboard-contable.html',
        };

        // Redirect if already logged in
        const sesion = localStorage.getItem('eli7e_user');
        if (sesion) {
            const u = JSON.parse(sesion);
            if (DASHBOARD[u.rol]) window.location.href = DASHBOARD[u.rol];
        }

        // ─── SPEED PARTICLES ────────────────────────
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;

            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = (30 + Math.random() * 80) + 'px';
                p.style.top = (Math.random() * 100) + '%';
                p.style.left = '-100px';
                container.appendChild(p);

                gsap.to(p, {
                    x: window.innerWidth + 200,
                    opacity: 0.15 + Math.random() * 0.25,
                    duration: 2 + Math.random() * 3,
                    delay: Math.random() * 4,
                    repeat: -1,
                    ease: 'none',
                    onRepeat: () => {
                        gsap.set(p, {
                            top: (Math.random() * 100) + '%',
                            width: (30 + Math.random() * 80) + 'px',
                        });
                    },
                });
            }
        }

        // ─── GSAP ENTRANCE ANIMATION ────────────────
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof gsap === 'undefined') return;

            // Hide everything
            gsap.set(['.hero-logo', '.hero-brand', '.hero-stat', '.divider',
                       '#loginHeader', '#glassCard', '.login-footer', '.glow-orb'], { opacity: 0 });
            gsap.set('.speed-trail', { opacity: 0, scaleX: 0, transformOrigin: 'right center' });

            const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

            // 1. Glow orb appears
            tl.to('.glow-orb', { opacity: 1, scale: 1.2, duration: 1, ease: 'power2.out' })

            // 2. Speed trails fire in
            .to('.speed-trail', {
                opacity: 0.6, scaleX: 1, duration: 0.4, stagger: 0.08, ease: 'power3.out'
            }, '-=0.6')

            // 3. Logo enters from left with momentum
            .fromTo('.hero-logo',
                { x: -80, opacity: 0, scale: 0.7 },
                { x: 0, opacity: 1, scale: 1, duration: 0.7, ease: 'back.out(1.3)' }, '-=0.3'
            )

            // 4. Speed trails fade out
            .to('.speed-trail', { opacity: 0, duration: 0.5, stagger: 0.05 }, '-=0.2')

            // 5. Brand name
            .fromTo('.hero-title',
                { y: 20, opacity: 0, scale: 0.9 },
                { y: 0, opacity: 1, scale: 1, duration: 0.5 }, '-=0.3'
            )
            .fromTo('.hero-title-glow',
                { opacity: 0 },
                { opacity: 0.3, duration: 0.6 }, '-=0.3'
            )
            .fromTo('.hero-tagline',
                { y: 10, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.4 }, '-=0.2'
            )

            // 6. Stats
            .fromTo('.stat-item',
                { y: 15, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.35, stagger: 0.1, ease: 'back.out(1.2)' }, '-=0.15'
            )

            // 7. Divider line
            .fromTo('.divider',
                { opacity: 0, scaleY: 0 },
                { opacity: 1, scaleY: 1, duration: 0.5, transformOrigin: 'center center' }, '-=0.3'
            )

            // 8. Login side
            .fromTo('#loginHeader',
                { x: 30, opacity: 0 },
                { x: 0, opacity: 1, duration: 0.4 }, '-=0.3'
            )
            .fromTo('#glassCard',
                { x: 40, opacity: 0, scale: 0.97 },
                { x: 0, opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.1)' }, '-=0.2'
            )

            // 9. Form fields stagger
            .fromTo('#glassCard .field',
                { y: 12, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.25, stagger: 0.08 }, '-=0.2'
            )
            .fromTo('.btn-login',
                { y: 8, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.25 }, '-=0.1'
            )
            .fromTo('.role-pill',
                { y: 6, opacity: 0, scale: 0.9 },
                { y: 0, opacity: 1, scale: 1, duration: 0.2, stagger: 0.05, ease: 'back.out(1.4)' }, '-=0.05'
            )
            .fromTo('.login-footer',
                { opacity: 0 },
                { opacity: 1, duration: 0.3 }, '-=0.1'
            );

            // ─── CONTINUOUS ANIMATIONS ──────────────
            // Logo float
            gsap.to('.hero-logo', {
                y: -8, duration: 2.5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2,
            });

            // Logo glow breathing
            gsap.to('.hero-logo img', {
                filter: 'drop-shadow(0 0 50px rgba(0,221,0,0.6)) drop-shadow(0 0 100px rgba(0,221,0,0.25))',
                duration: 2, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2,
            });

            // Title glow pulse
            gsap.to('.hero-title-glow', {
                opacity: 0.5, filter: 'blur(25px)',
                duration: 2, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2.5,
            });

            // Glow orb breathing
            gsap.to('.glow-orb', {
                scale: 1.3, opacity: 0.8,
                duration: 3, ease: 'sine.inOut', yoyo: true, repeat: -1,
            });

            // Divider dot glow
            gsap.to('.divider::after', {
                boxShadow: '0 0 20px #00DD00, 0 0 40px rgba(0,221,0,0.5)',
                duration: 1.5, ease: 'sine.inOut', yoyo: true, repeat: -1,
            });

            // Speed particles
            createParticles();

            // ─── HOVER INTERACTIONS ─────────────────
            const btn = document.querySelector('.btn-login');
            if (btn) {
                btn.addEventListener('mouseenter', () =>
                    gsap.to(btn, { y: -2, boxShadow: '0 8px 32px rgba(0,221,0,0.4)', duration: 0.25, ease: 'power2.out' })
                );
                btn.addEventListener('mouseleave', () =>
                    gsap.to(btn, { y: 0, boxShadow: 'none', duration: 0.2, ease: 'power2.out' })
                );
                btn.addEventListener('mousedown', () =>
                    gsap.to(btn, { scale: 0.97, duration: 0.08 })
                );
                btn.addEventListener('mouseup', () =>
                    gsap.to(btn, { scale: 1, duration: 0.25, ease: 'back.out(1.7)' })
                );
            }

            document.querySelectorAll('.role-pill').forEach(pill => {
                pill.addEventListener('mouseenter', () =>
                    gsap.to(pill, { y: -3, scale: 1.06, duration: 0.2, ease: 'power2.out' })
                );
                pill.addEventListener('mouseleave', () =>
                    gsap.to(pill, { y: 0, scale: 1, duration: 0.2, ease: 'power2.out' })
                );
            });

            document.querySelectorAll('.stat-item').forEach(s => {
                s.addEventListener('mouseenter', () =>
                    gsap.to(s, { y: -3, scale: 1.05, duration: 0.2, ease: 'power2.out' })
                );
                s.addEventListener('mouseleave', () =>
                    gsap.to(s, { y: 0, scale: 1, duration: 0.2, ease: 'power2.out' })
                );
            });
        });

        // ─── LOGIN FORM ─────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const err = document.getElementById('errorMsg');
            err.classList.remove('show');
            btn.classList.add('loading');
            btn.disabled = true;

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    err.textContent = data.error || 'Error al iniciar sesión';
                    err.classList.add('show');
                    if (typeof gsap !== 'undefined') {
                        gsap.fromTo(err, { x: -8 }, { x: 0, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
                    }
                    return;
                }

                // Save & redirect with exit animation
                localStorage.setItem('eli7e_token', data.token);
                localStorage.setItem('eli7e_user', JSON.stringify(data.user));

                if (typeof gsap !== 'undefined') {
                    gsap.to('.split', {
                        opacity: 0, scale: 1.02, duration: 0.4, ease: 'power2.in',
                        onComplete: () => {
                            window.location.href = DASHBOARD[data.user.rol] || 'dashboard-admin.html';
                        },
                    });
                } else {
                    window.location.href = DASHBOARD[data.user.rol] || 'dashboard-admin.html';
                }

            } catch {
                err.textContent = 'No se pudo conectar con el servidor';
                err.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
