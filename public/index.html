<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli7e — Acceso al Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --g1: #00DD00;
            --g2: #00BB00;
            --g3: #007700;
            --g4: #004400;
            --bg: #0A0E0A;
            --card: rgba(12, 20, 12, 0.85);
            --border: rgba(0, 221, 0, 0.12);
            --text: #E4F5E4;
            --muted: #6A8A6A;
            --err: #FF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ═══════════════════════════════════════════ */
        /*  SCREEN 1: HERO (MOTO SHOWCASE)            */
        /* ═══════════════════════════════════════════ */
        .hero-screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Atmospheric background */
        .hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 70% at 45% 55%, rgba(0, 60, 0, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 30%, rgba(0, 100, 0, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 40% 50% at 15% 70%, rgba(0, 80, 0, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Subtle floor reflection */
        .floor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 35%;
            background: linear-gradient(to top, rgba(0, 221, 0, 0.02), transparent);
            pointer-events: none;
        }

        .floor::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 221, 0, 0.1), transparent);
        }

        /* ─── BRAND (top left) ─────────────────── */
        .brand {
            position: absolute;
            top: 36px;
            left: 48px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            height: 28px;
            filter: drop-shadow(0 0 8px rgba(0, 221, 0, 0.4));
            mix-blend-mode: lighten;
        }

        .brand-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--g1);
            letter-spacing: 1px;
        }

        .brand-name span {
            color: var(--text);
        }

        /* ─── MOTORCYCLE (center) ──────────────── */
        .moto-container {
            position: relative;
            z-index: 3;
            margin-right: 60px;
        }

        .moto-img {
            height: 320px;
            filter:
                drop-shadow(0 0 60px rgba(0, 221, 0, 0.2))
                drop-shadow(0 20px 40px rgba(0, 0, 0, 0.5));
            mix-blend-mode: lighten;
            transform-origin: center bottom;
        }

        /* Glow under motorcycle */
        .moto-glow {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 40px;
            background: radial-gradient(ellipse, rgba(0, 221, 0, 0.12) 0%, transparent 70%);
            filter: blur(10px);
            pointer-events: none;
        }

        /* Speed lines (hidden initially) */
        .speed-lines {
            position: absolute;
            top: 0;
            left: -200px;
            bottom: 0;
            width: 200px;
            pointer-events: none;
        }

        .speed-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, var(--g1), transparent);
            border-radius: 2px;
            opacity: 0;
            right: 0;
        }

        /* Exhaust particles */
        .exhaust {
            position: absolute;
            left: -10px;
            bottom: 30%;
            pointer-events: none;
        }

        .exhaust-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--g1);
            opacity: 0;
        }

        /* ─── SPECS PANEL (right side) ─────────── */
        .specs-panel {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 5;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            padding: 8px 0;
            transition: transform 0.2s;
        }

        .spec-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--g3);
            background: transparent;
            flex-shrink: 0;
            transition: all 0.3s;
            position: relative;
        }

        .spec-dot::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: transparent;
            transition: all 0.3s;
        }

        .spec-item:hover .spec-dot,
        .spec-item.active .spec-dot {
            border-color: var(--g1);
            box-shadow: 0 0 10px rgba(0, 221, 0, 0.3);
        }

        .spec-item.active .spec-dot::after {
            background: var(--g1);
        }

        .spec-val {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            transition: color 0.3s;
        }

        .spec-item:hover .spec-val,
        .spec-item.active .spec-val {
            color: var(--g1);
        }

        .spec-lbl {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* ─── BOTTOM LEFT ──────────────────────── */
        .bottom-info {
            position: absolute;
            bottom: 36px;
            left: 48px;
            z-index: 5;
        }

        .bottom-tagline {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .social-dots {
            display: flex;
            gap: 12px;
        }

        .social-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
            transition: all 0.2s;
        }

        .social-dot:hover {
            background: var(--g1);
            box-shadow: 0 0 8px var(--g1);
        }

        /* ─── GO BUTTON (bottom right) ─────────── */
        .go-btn {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 72px;
            height: 72px;
            background: var(--g1);
            color: #000;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            transition: background 0.2s;
        }

        .go-btn:hover {
            background: #00FF00;
        }

        /* ═══════════════════════════════════════════ */
        /*  SCREEN 2: LOGIN FORM                      */
        /* ═══════════════════════════════════════════ */
        .login-screen {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .login-screen.visible {
            display: flex;
        }

        /* Dot grid background */
        .login-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(0, 221, 0, 0.04) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        .login-screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(0, 80, 0, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 32px;
            padding: 4px 0;
            border: none;
            background: none;
            font-family: inherit;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--g1);
        }

        .back-arrow {
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .back-btn:hover .back-arrow {
            transform: translateX(-4px);
        }

        /* Mini logo */
        .login-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .login-brand img {
            height: 32px;
            filter: drop-shadow(0 0 8px rgba(0, 221, 0, 0.3));
            mix-blend-mode: lighten;
        }

        .login-brand-name {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--g1);
        }

        .login-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
            margin-top: 24px;
        }

        .login-sub {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .selected-role-tag {
            display: none;
            align-items: center;
            gap: 6px;
            background: rgba(0, 221, 0, 0.08);
            border: 1px solid rgba(0, 221, 0, 0.2);
            border-radius: 999px;
            padding: 4px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--g1);
            margin-bottom: 20px;
            width: fit-content;
        }

        .selected-role-tag.show {
            display: inline-flex;
        }

        /* Glass card */
        .login-card {
            background: var(--card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow:
                0 0 80px rgba(0, 221, 0, 0.04),
                0 24px 48px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(0, 221, 0, 0.06);
        }

        .field { margin-bottom: 20px; }

        label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: rgba(10, 18, 10, 0.9);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: var(--g1);
            box-shadow: 0 0 0 3px rgba(0, 221, 0, 0.06), 0 0 16px rgba(0, 221, 0, 0.04);
        }

        input::placeholder { color: rgba(106, 138, 106, 0.5); }

        .error-msg {
            background: rgba(255, 68, 68, 0.08);
            border: 1px solid rgba(255, 68, 68, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: var(--err);
            margin-bottom: 16px;
            display: none;
        }

        .error-msg.show { display: block; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--g1), var(--g3));
            color: #000;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .btn-login:hover::before { transform: translateX(100%); }

        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .spinner { display: none; }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: inline; }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.65rem;
            color: rgba(106, 138, 106, 0.3);
            letter-spacing: 0.5px;
        }

        /* ─── RESPONSIVE ───────────────────────── */
        @media (max-width: 900px) {
            .moto-img { height: 220px; }
            .moto-container { margin-right: 0; margin-bottom: 20px; }
            .specs-panel {
                position: absolute;
                right: 24px;
                gap: 20px;
            }
            .spec-val { font-size: 0.95rem; }
            .brand { top: 20px; left: 24px; }
            .bottom-info { bottom: 20px; left: 24px; }
            .go-btn { width: 60px; height: 60px; font-size: 0.95rem; }
        }

        @media (max-width: 600px) {
            .moto-img { height: 160px; }
            .specs-panel {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px 24px;
                margin-top: 20px;
            }
            .hero-screen {
                flex-direction: column;
                padding-top: 80px;
            }
            .brand-name { font-size: 1.1rem; }
            .bottom-info { display: none; }
            .go-btn { width: 56px; height: 56px; }
        }
    </style>
</head>

<body>

    <!-- ═══ SCREEN 1: HERO ═══════════════════════ -->
    <div class="hero-screen" id="heroScreen">
        <div class="hero-bg"></div>
        <div class="floor" id="floor"></div>

        <!-- Brand -->
        <div class="brand" id="brand">
            <img src="img/eli7e_logo.png" class="brand-logo" alt="" onerror="this.style.display='none'">
            <div class="brand-name"><span>ELI</span>7E</div>
        </div>

        <!-- Motorcycle -->
        <div class="moto-container" id="motoContainer">
            <div class="speed-lines" id="speedLines"></div>
            <img src="img/eli7e_logo.png" class="moto-img" id="motoImg" alt="Eli7e"
                 onerror="this.style.display='none'">
            <div class="moto-glow" id="motoGlow"></div>
            <div class="exhaust" id="exhaust"></div>
        </div>

        <!-- Specs panel (roles) -->
        <div class="specs-panel" id="specsPanel">
            <div class="spec-item" data-role="admin" onclick="selectRole(this, 'admin')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Admin</div>
                    <div class="spec-lbl">ADMINISTRADOR</div>
                </div>
            </div>
            <div class="spec-item" data-role="cc" onclick="selectRole(this, 'cc')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Call Center</div>
                    <div class="spec-lbl">OPERADOR</div>
                </div>
            </div>
            <div class="spec-item" data-role="cont" onclick="selectRole(this, 'cont')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Contable</div>
                    <div class="spec-lbl">FINANZAS</div>
                </div>
            </div>
            <div class="spec-item" data-role="moto" onclick="selectRole(this, 'moto')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Motorizados</div>
                    <div class="spec-lbl">CONDUCTORES</div>
                </div>
            </div>
        </div>

        <!-- Bottom info -->
        <div class="bottom-info" id="bottomInfo">
            <div class="bottom-tagline">Sistema de Gestión Operativa</div>
            <div class="social-dots">
                <div class="social-dot"></div>
                <div class="social-dot"></div>
                <div class="social-dot"></div>
                <div class="social-dot"></div>
            </div>
        </div>

        <!-- GO button -->
        <div class="go-btn" id="goBtn" onclick="launchMoto()">GO</div>
    </div>

    <!-- ═══ SCREEN 2: LOGIN FORM ═════════════════ -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container" id="loginContainer">

            <button class="back-btn" id="backBtn" onclick="goBack()">
                <span class="back-arrow">←</span> Volver
            </button>

            <div class="login-brand">
                <img src="img/eli7e_logo.png" alt="" onerror="this.style.display='none'">
                <div class="login-brand-name">Eli7e</div>
            </div>

            <h2 class="login-title">Ingresa al sistema</h2>
            <p class="login-sub">Credenciales de acceso al centro de operaciones</p>

            <div class="selected-role-tag" id="roleTag">
                <span>●</span> <span id="roleTagText">Admin</span>
            </div>

            <div class="login-card" id="loginCard">
                <div class="error-msg" id="errorMsg"></div>

                <form id="loginForm">
                    <div class="field">
                        <label>✉ Correo electrónico</label>
                        <input type="email" id="email" placeholder="usuario@eli7e.com" autocomplete="email" required>
                    </div>
                    <div class="field">
                        <label>🔒 Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn-login" id="btnLogin">
                        <span class="btn-text">Ingresar al Sistema</span>
                        <span class="spinner">Verificando...</span>
                    </button>
                </form>
            </div>

            <div class="login-footer">Eli7e © 2026 · Puerto Ordaz, Venezuela</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script>
        // ─── CONFIG ──────────────────────────────────
        const DEMO = {
            admin: { email: 'admin@eli7e.com', password: 'eli7e2026', label: 'Admin' },
            cc:    { email: 'callcenter@eli7e.com', password: 'eli7e2026', label: 'Call Center' },
            cont:  { email: 'contable@eli7e.com', password: 'eli7e2026', label: 'Contable' },
            moto:  { email: '', password: '', label: 'Motorizados', redirect: 'dashboard-motorizado.html' },
        };

        const DASHBOARD = {
            admin: 'dashboard-admin.html',
            call_center: 'dashboard-callcenter.html',
            contable: 'dashboard-contable.html',
        };

        let selectedRole = null;
        let isAnimating = false;

        // Redirect if already logged in
        const sesion = localStorage.getItem('eli7e_user');
        if (sesion) {
            const u = JSON.parse(sesion);
            if (DASHBOARD[u.rol]) window.location.href = DASHBOARD[u.rol];
        }

        // ─── ROLE SELECTION ──────────────────────────
        function selectRole(el, role) {
            if (isAnimating) return;
            document.querySelectorAll('.spec-item').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            selectedRole = role;

            if (typeof gsap !== 'undefined') {
                gsap.to(el, { scale: 1.05, duration: 0.15, yoyo: true, repeat: 1 });
                // Moto reacts to selection — slight rev
                gsap.to('#motoImg', {
                    rotation: -2, x: 5, duration: 0.15,
                    yoyo: true, repeat: 1, ease: 'power2.out',
                });
                gsap.to('#motoGlow', {
                    opacity: 1, scaleX: 1.2, duration: 0.3, yoyo: true, repeat: 1,
                });
            }
        }

        // ─── BUILD SPEED LINES ───────────────────────
        function buildSpeedLines() {
            const container = document.getElementById('speedLines');
            for (let i = 0; i < 8; i++) {
                const line = document.createElement('div');
                line.className = 'speed-line';
                line.style.top = (15 + Math.random() * 70) + '%';
                line.style.width = (40 + Math.random() * 100) + 'px';
                container.appendChild(line);
            }
        }

        // ─── BUILD EXHAUST PARTICLES ─────────────────
        function buildExhaust() {
            const container = document.getElementById('exhaust');
            for (let i = 0; i < 6; i++) {
                const dot = document.createElement('div');
                dot.className = 'exhaust-dot';
                container.appendChild(dot);
            }
        }

        // ─── LAUNCH MOTO ANIMATION ───────────────────
        function launchMoto() {
            if (isAnimating) return;

            // If moto role selected, redirect directly
            if (selectedRole === 'moto') {
                window.location.href = 'dashboard-motorizado.html';
                return;
            }

            isAnimating = true;

            if (typeof gsap === 'undefined') {
                showLoginScreen();
                return;
            }

            const tl = gsap.timeline({
                onComplete: () => {
                    showLoginScreen();
                    isAnimating = false;
                },
            });

            // 1. Moto revs (tilts forward, vibrates)
            tl.to('#motoImg', {
                rotation: -5, x: -10, duration: 0.2, ease: 'power2.out',
            })
            .to('#motoImg', {
                x: -8, duration: 0.05, yoyo: true, repeat: 5,
            })

            // 2. Exhaust burst
            .to('.exhaust-dot', {
                x: () => -(30 + Math.random() * 60),
                y: () => (Math.random() - 0.5) * 30,
                opacity: 0.8,
                scale: 1 + Math.random(),
                duration: 0.3,
                stagger: 0.03,
                ease: 'power2.out',
            }, '-=0.15')
            .to('.exhaust-dot', {
                opacity: 0, scale: 0, duration: 0.2,
            })

            // 3. Speed lines fire
            .to('.speed-line', {
                opacity: 0.6,
                x: -100,
                duration: 0.3,
                stagger: 0.02,
                ease: 'power3.out',
            }, '-=0.3')

            // 4. MOTO LAUNCHES RIGHT
            .to('#motoImg', {
                x: window.innerWidth + 400,
                rotation: -3,
                scale: 0.9,
                duration: 0.6,
                ease: 'power3.in',
            }, '-=0.1')

            // Speed lines follow
            .to('.speed-line', {
                x: window.innerWidth + 200,
                opacity: 0,
                duration: 0.4,
                stagger: 0.02,
                ease: 'power2.in',
            }, '-=0.5')

            // Glow follows
            .to('#motoGlow', {
                x: window.innerWidth + 200,
                opacity: 0,
                duration: 0.4,
            }, '-=0.5')

            // 5. UI fades out
            .to(['#specsPanel', '#bottomInfo', '#brand', '#goBtn'], {
                opacity: 0,
                duration: 0.3,
                ease: 'power2.in',
            }, '-=0.4')

            // 6. Screen fades
            .to('#heroScreen', {
                opacity: 0,
                duration: 0.3,
                ease: 'power2.in',
            });
        }

        // ─── SHOW LOGIN SCREEN ───────────────────────
        function showLoginScreen() {
            const hero = document.getElementById('heroScreen');
            const login = document.getElementById('loginScreen');
            hero.style.display = 'none';
            login.classList.add('visible');

            // Pre-fill if role selected
            if (selectedRole && DEMO[selectedRole]) {
                const d = DEMO[selectedRole];
                document.getElementById('email').value = d.email;
                document.getElementById('password').value = d.password;
                document.getElementById('roleTagText').textContent = d.label;
                document.getElementById('roleTag').classList.add('show');
            }

            if (typeof gsap === 'undefined') return;

            // Entrance animation
            gsap.set(['#loginContainer'], { opacity: 0 });

            const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

            tl.fromTo('#loginContainer',
                { opacity: 0, y: 30 },
                { opacity: 1, y: 0, duration: 0.5 }
            )
            .fromTo('.back-btn',
                { x: -10, opacity: 0 },
                { x: 0, opacity: 1, duration: 0.3 }, '-=0.2'
            )
            .fromTo('.login-brand',
                { y: 10, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.3 }, '-=0.15'
            )
            .fromTo(['.login-title', '.login-sub'],
                { y: 8, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.25, stagger: 0.06 }, '-=0.1'
            )
            .fromTo('#roleTag',
                { scale: 0.9, opacity: 0 },
                { scale: 1, opacity: 1, duration: 0.2 }, '-=0.05'
            )
            .fromTo('#loginCard',
                { y: 20, opacity: 0, scale: 0.97 },
                { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.1)' }, '-=0.1'
            )
            .fromTo('#loginCard .field',
                { y: 10, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.2, stagger: 0.06 }, '-=0.15'
            )
            .fromTo('.btn-login',
                { y: 8, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.2 }, '-=0.05'
            );
        }

        // ─── GO BACK ─────────────────────────────────
        function goBack() {
            if (typeof gsap !== 'undefined') {
                gsap.to('#loginScreen', {
                    opacity: 0, duration: 0.3,
                    onComplete: () => {
                        document.getElementById('loginScreen').classList.remove('visible');
                        document.getElementById('loginScreen').style.opacity = '';

                        // Reset hero
                        const hero = document.getElementById('heroScreen');
                        hero.style.display = 'flex';
                        hero.style.opacity = '1';
                        gsap.set('#motoImg', { x: 0, rotation: 0, scale: 1 });
                        gsap.set('#motoGlow', { x: 0, opacity: 1 });
                        gsap.set('.speed-line', { x: 0, opacity: 0 });
                        gsap.set(['#specsPanel', '#bottomInfo', '#brand', '#goBtn'], { opacity: 1 });

                        selectedRole = null;
                        document.querySelectorAll('.spec-item').forEach(s => s.classList.remove('active'));

                        // Re-entrance
                        gsap.fromTo('#heroScreen', { opacity: 0 }, { opacity: 1, duration: 0.3 });
                        gsap.fromTo('#motoImg',
                            { x: -60, opacity: 0 },
                            { x: 0, opacity: 1, duration: 0.5, ease: 'back.out(1.2)' }
                        );
                    },
                });
            } else {
                document.getElementById('loginScreen').classList.remove('visible');
                document.getElementById('heroScreen').style.display = 'flex';
            }
        }

        // ─── INIT ────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            buildSpeedLines();
            buildExhaust();

            if (typeof gsap === 'undefined') return;

            // Hero entrance animation
            gsap.set(['#brand', '#motoContainer', '#specsPanel', '#bottomInfo', '#goBtn'], { opacity: 0 });

            const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

            // Brand
            tl.fromTo('#brand',
                { x: -20, opacity: 0 },
                { x: 0, opacity: 1, duration: 0.4 }
            )

            // Moto enters from left
            .fromTo('#motoContainer',
                { x: -120, opacity: 0, scale: 0.85 },
                { x: 0, opacity: 1, scale: 1, duration: 0.7, ease: 'back.out(1.15)' }, '-=0.1'
            )

            // Specs stagger from right
            .fromTo('.spec-item',
                { x: 30, opacity: 0 },
                { x: 0, opacity: 1, duration: 0.35, stagger: 0.08, ease: 'back.out(1.2)' }, '-=0.3'
            )

            // Bottom info
            .fromTo('#bottomInfo',
                { y: 10, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.3 }, '-=0.2'
            )

            // GO button
            .fromTo('#goBtn',
                { scale: 0.8, opacity: 0 },
                { scale: 1, opacity: 1, duration: 0.3, ease: 'back.out(1.5)' }, '-=0.15'
            );

            // ─── CONTINUOUS ANIMS ────────────────────
            // Moto floating
            gsap.to('#motoImg', {
                y: -6, duration: 2.5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1.5,
            });

            // Glow breathing
            gsap.to('#motoGlow', {
                opacity: 0.6, scaleX: 1.1,
                duration: 2, ease: 'sine.inOut', yoyo: true, repeat: -1,
            });

            // Logo glow
            gsap.to('#motoImg', {
                filter: 'drop-shadow(0 0 70px rgba(0,221,0,0.35)) drop-shadow(0 20px 40px rgba(0,0,0,0.5))',
                duration: 2, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1,
            });

            // Hover interactions
            document.querySelectorAll('.spec-item').forEach(item => {
                item.addEventListener('mouseenter', () =>
                    gsap.to(item, { x: -6, duration: 0.2, ease: 'power2.out' })
                );
                item.addEventListener('mouseleave', () => {
                    if (!item.classList.contains('active'))
                        gsap.to(item, { x: 0, duration: 0.2, ease: 'power2.out' });
                });
            });

            const goBtn = document.getElementById('goBtn');
            goBtn.addEventListener('mouseenter', () =>
                gsap.to(goBtn, { scale: 1.08, boxShadow: '0 0 30px rgba(0,221,0,0.4)', duration: 0.2 })
            );
            goBtn.addEventListener('mouseleave', () =>
                gsap.to(goBtn, { scale: 1, boxShadow: 'none', duration: 0.2 })
            );

            // Login screen hovers
            const btn = document.querySelector('.btn-login');
            if (btn) {
                btn.addEventListener('mouseenter', () =>
                    gsap.to(btn, { y: -2, boxShadow: '0 8px 28px rgba(0,221,0,0.35)', duration: 0.2 })
                );
                btn.addEventListener('mouseleave', () =>
                    gsap.to(btn, { y: 0, boxShadow: 'none', duration: 0.2 })
                );
            }
        });

        // ─── LOGIN FORM ──────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const err = document.getElementById('errorMsg');
            err.classList.remove('show');
            btn.classList.add('loading');
            btn.disabled = true;

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    err.textContent = data.error || 'Error al iniciar sesión';
                    err.classList.add('show');
                    if (typeof gsap !== 'undefined')
                        gsap.fromTo(err, { x: -8 }, { x: 0, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
                    return;
                }

                localStorage.setItem('eli7e_token', data.token);
                localStorage.setItem('eli7e_user', JSON.stringify(data.user));

                if (typeof gsap !== 'undefined') {
                    gsap.to('#loginScreen', {
                        opacity: 0, scale: 1.03, duration: 0.35,
                        onComplete: () => {
                            window.location.href = DASHBOARD[data.user.rol] || 'dashboard-admin.html';
                        },
                    });
                } else {
                    window.location.href = DASHBOARD[data.user.rol] || 'dashboard-admin.html';
                }
            } catch {
                err.textContent = 'No se pudo conectar con el servidor';
                err.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
