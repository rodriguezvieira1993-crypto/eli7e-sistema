<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli7e — Acceso al Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --g1: #00DD00;
            --g2: #00BB00;
            --g3: #007700;
            --bg: #1C1C1C;
            --bg2: #242424;
            --text: #F0F0F0;
            --muted: #888888;
            --border: rgba(0, 221, 0, 0.15);
            --err: #FF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════ */
        /*  SCREEN 1: HERO (MOTO SHOWCASE)            */
        /* ═══════════════════════════════════════════ */
        .hero-screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        /* Smoky atmospheric background */
        .hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 80% at 40% 50%, rgba(50, 50, 50, 0.6) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 70% 30%, rgba(60, 60, 60, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 20% 70%, rgba(40, 40, 40, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse 100% 40% at 50% 100%, rgba(0, 60, 0, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Floor gradient — subtle ground reflection */
        .floor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.3), transparent);
            pointer-events: none;
        }

        .floor::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            right: 5%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
        }

        /* Smoke wisps — use opacity instead of blur for performance */
        .smoke {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(80,80,80,0.12) 0%, transparent 70%);
            pointer-events: none;
            will-change: transform, opacity;
        }

        .smoke-1 { width: 500px; height: 300px; top: 20%; left: 15%; }
        .smoke-2 { width: 400px; height: 250px; top: 40%; right: 20%; }
        .smoke-3 { width: 350px; height: 200px; bottom: 25%; left: 35%; }

        /* ─── BRAND (top left) ─────────────────── */
        .brand {
            position: absolute;
            top: 32px;
            left: 40px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand img {
            height: 24px;
            opacity: 0.9;
        }

        .brand-text {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text);
        }

        .brand-text span {
            color: var(--g1);
        }

        /* ─── MOTORCYCLE (center) ──────────────── */
        .moto-container {
            position: relative;
            z-index: 3;
        }

        .moto-img {
            height: 360px;
            max-width: 90vw;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.6));
            transform-origin: center bottom;
            will-change: transform, opacity;
        }

        /* Green halo behind moto — no blur, use large gradient instead */
        .moto-halo {
            position: absolute;
            width: 600px;
            height: 250px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%);
            background: radial-gradient(ellipse, rgba(0, 221, 0, 0.05) 0%, transparent 60%);
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Green accent reflection under moto */
        .moto-reflect {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 30px;
            background: radial-gradient(ellipse, rgba(0, 221, 0, 0.08) 0%, transparent 70%);
            filter: blur(8px);
            pointer-events: none;
        }

        /* Speed lines */
        .speed-lines {
            position: absolute;
            top: 0; left: -200px; bottom: 0; width: 200px;
            pointer-events: none;
        }

        .speed-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, var(--g1), transparent);
            border-radius: 2px;
            opacity: 0;
            right: 0;
        }

        /* Exhaust */
        .exhaust {
            position: absolute;
            left: -10px;
            bottom: 30%;
            pointer-events: none;
        }

        .exhaust-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--g1);
            opacity: 0;
        }

        /* ─── SPECS PANEL (right side) ─────────── */
        .specs-panel {
            position: absolute;
            right: 56px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 32px;
            z-index: 5;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            padding: 6px 0;
        }

        .spec-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--g3);
            background: transparent;
            flex-shrink: 0;
            transition: all 0.3s;
            position: relative;
        }

        .spec-dot::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: transparent;
            transition: all 0.3s;
        }

        .spec-item:hover .spec-dot,
        .spec-item.active .spec-dot {
            border-color: var(--g1);
            box-shadow: 0 0 10px rgba(0, 221, 0, 0.3);
        }

        .spec-item.active .spec-dot::after {
            background: var(--g1);
        }

        .spec-val {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            transition: color 0.3s;
        }

        .spec-item:hover .spec-val,
        .spec-item.active .spec-val {
            color: var(--g1);
        }

        .spec-lbl {
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* ─── BOTTOM LEFT ──────────────────────── */
        .bottom-info {
            position: absolute;
            bottom: 32px;
            left: 40px;
            z-index: 5;
        }

        .bottom-tagline {
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .social-dots {
            display: flex;
            gap: 12px;
        }

        .social-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
            opacity: 0.5;
            transition: all 0.2s;
            cursor: pointer;
        }

        .social-dot:hover {
            background: var(--g1);
            opacity: 1;
            box-shadow: 0 0 8px var(--g1);
        }

        /* ─── GO BUTTON (bottom right) ─────────── */
        .go-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 72px;
            height: 72px;
            background: var(--g1);
            color: #000;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
        }

        .go-btn:hover { background: #00FF00; }

        @keyframes goPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0,221,0,0.3), inset 0 0 10px rgba(0,0,0,0.15); }
            50% { box-shadow: 0 0 40px rgba(0,221,0,0.5), 0 0 80px rgba(0,221,0,0.15), inset 0 0 10px rgba(0,0,0,0.15); }
        }

        .go-btn { animation: goPulse 2.5s ease-in-out infinite; }

        /* ═══════════════════════════════════════════ */
        /*  SCREEN 2: LOGIN                           */
        /* ═══════════════════════════════════════════ */
        .login-screen {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .login-screen.visible { display: flex; }

        .login-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 50% 50%, rgba(50,50,50,0.3) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 32px;
            border: none;
            background: none;
            font-family: inherit;
            transition: color 0.2s;
        }

        .back-btn:hover { color: var(--g1); }

        .back-arrow {
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .back-btn:hover .back-arrow { transform: translateX(-4px); }

        .login-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .login-brand img {
            height: 28px;
            opacity: 0.9;
        }

        .login-brand-name {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text);
        }

        .login-brand-name span { color: var(--g1); }

        .login-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-sub {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 24px;
        }

        .role-tag {
            display: none;
            align-items: center;
            gap: 6px;
            background: rgba(0, 221, 0, 0.06);
            border: 1px solid rgba(0, 221, 0, 0.15);
            border-radius: 999px;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--g1);
            margin-bottom: 20px;
            width: fit-content;
        }

        .role-tag.show { display: inline-flex; }

        .login-card {
            background: rgba(28, 28, 28, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
        }

        .field { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: var(--g1);
            box-shadow: 0 0 0 3px rgba(0, 221, 0, 0.06);
        }

        input::placeholder { color: rgba(255,255,255,0.2); }

        .error-msg {
            background: rgba(255, 68, 68, 0.08);
            border: 1px solid rgba(255, 68, 68, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: var(--err);
            margin-bottom: 16px;
            display: none;
        }

        .error-msg.show { display: block; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--g1), var(--g3));
            color: #000;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .btn-login:hover::before { transform: translateX(100%); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .spinner { display: none; }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: inline; }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
        }

        /* ─── RESPONSIVE ───────────────────────── */
        @media (max-width: 900px) {
            .moto-img { height: 240px; }
            .specs-panel { right: 24px; gap: 20px; }
            .brand { top: 20px; left: 24px; }
            .bottom-info { bottom: 20px; left: 24px; }
            .go-btn { width: 60px; height: 60px; font-size: 0.95rem; }
        }

        @media (max-width: 600px) {
            .moto-img { height: 180px; }
            .specs-panel {
                position: absolute;
                right: auto;
                left: 50%;
                top: auto;
                bottom: 100px;
                transform: translateX(-50%);
                flex-direction: row;
                gap: 16px;
            }
            .spec-lbl { display: none; }
            .hero-screen { flex-direction: column; }
            .bottom-info { display: none; }
            .go-btn { width: 56px; height: 56px; }
        }
    </style>
</head>

<body>

    <!-- ═══ SCREEN 1: HERO ═══════════════════════ -->
    <div class="hero-screen" id="heroScreen">
        <div class="hero-bg"></div>
        <div class="floor"></div>
        <div class="smoke smoke-1" id="smoke1"></div>
        <div class="smoke smoke-2" id="smoke2"></div>
        <div class="smoke smoke-3" id="smoke3"></div>

        <!-- Brand top-left -->
        <div class="brand" id="brand">
            <img src="img/eli7e_logo.png" alt="Eli7e">
            <div class="brand-text">ELI<span>7E</span></div>
        </div>

        <!-- Motorcycle center -->
        <div class="moto-container" id="motoContainer">
            <div class="moto-halo" id="motoHalo"></div>
            <div class="speed-lines" id="speedLines"></div>
            <img src="img/moto_hero.png" class="moto-img" id="motoImg" alt="Moto">
            <div class="moto-reflect" id="motoReflect"></div>
            <div class="exhaust" id="exhaust"></div>
        </div>

        <!-- Specs = Roles (right side) -->
        <div class="specs-panel" id="specsPanel">
            <div class="spec-item" onclick="selectRole(this, 'admin')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Admin</div>
                    <div class="spec-lbl">ADMINISTRADOR</div>
                </div>
            </div>
            <div class="spec-item" onclick="selectRole(this, 'cc')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Call Center</div>
                    <div class="spec-lbl">OPERADOR</div>
                </div>
            </div>
            <div class="spec-item" onclick="selectRole(this, 'cont')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Contable</div>
                    <div class="spec-lbl">FINANZAS</div>
                </div>
            </div>
            <div class="spec-item" onclick="selectRole(this, 'moto')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Motorizados</div>
                    <div class="spec-lbl">CONDUCTORES</div>
                </div>
            </div>
        </div>

        <!-- Bottom left -->
        <div class="bottom-info" id="bottomInfo">
            <div class="bottom-tagline">Sistema de Gestión Operativa</div>
            <div class="social-dots">
                <div class="social-dot"></div>
                <div class="social-dot"></div>
                <div class="social-dot"></div>
                <div class="social-dot"></div>
            </div>
        </div>

        <!-- GO button -->
        <div class="go-btn" id="goBtn" onclick="launchMoto()">GO</div>
    </div>

    <!-- ═══ SCREEN 2: LOGIN ═════════════════════ -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container" id="loginContainer">

            <button class="back-btn" onclick="goBack()">
                <span class="back-arrow">←</span> Volver
            </button>

            <div class="login-brand">
                <img src="img/eli7e_logo.png" alt="">
                <div class="login-brand-name">ELI<span>7E</span></div>
            </div>

            <h2 class="login-title">Ingresa al sistema</h2>
            <p class="login-sub">Credenciales de acceso al centro de operaciones</p>

            <div class="role-tag" id="roleTag">
                <span style="color:var(--g1)">●</span> <span id="roleTagText"></span>
            </div>

            <div class="login-card" id="loginCard">
                <div class="error-msg" id="errorMsg"></div>
                <form id="loginForm">
                    <div class="field">
                        <label>Correo electrónico</label>
                        <input type="email" id="email" placeholder="usuario@eli7e.com" autocomplete="email" required>
                    </div>
                    <div class="field">
                        <label>Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn-login" id="btnLogin">
                        <span class="btn-text">Ingresar al Sistema</span>
                        <span class="spinner">Verificando...</span>
                    </button>
                </form>
            </div>

            <div class="login-footer">Eli7e © 2026 · Puerto Ordaz, Venezuela</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script>
        // ─── CONFIG ──────────────────────────────────
        const DEMO = {
            admin: { email: 'admin@eli7e.com', password: 'eli7e2026', label: 'Admin' },
            cc:    { email: 'callcenter@eli7e.com', password: 'eli7e2026', label: 'Call Center' },
            cont:  { email: 'contable@eli7e.com', password: 'eli7e2026', label: 'Contable' },
            moto:  { email: '', password: '', label: 'Motorizados', redirect: 'dashboard-motorizado.html' },
        };

        const DASHBOARD = {
            admin: 'dashboard-admin.html',
            call_center: 'dashboard-callcenter.html',
            contable: 'dashboard-contable.html',
        };

        let selectedRole = null;
        let isAnimating = false;
        const _g = () => typeof gsap !== 'undefined';

        // Auto-redirect if logged in
        const sesion = localStorage.getItem('eli7e_user');
        if (sesion) {
            const u = JSON.parse(sesion);
            if (DASHBOARD[u.rol]) window.location.href = DASHBOARD[u.rol];
        }

        // ─── REMOVE WHITE BG — chunked to avoid jank ─
        function removeWhiteBG(img) {
            const canvas = document.createElement('canvas');
            const w = img.naturalWidth, h = img.naturalHeight;
            if (!w || !h) return;
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(img, 0, 0, w, h);

            const imageData = ctx.getImageData(0, 0, w, h);
            const d = imageData.data;
            const total = d.length;
            const CHUNK = 200000; // pixels per frame (~50k pixels)
            let offset = 0;

            function processChunk() {
                const end = Math.min(offset + CHUNK, total);
                for (let i = offset; i < end; i += 4) {
                    const mn = Math.min(d[i], d[i+1], d[i+2]);
                    const chroma = Math.max(d[i], d[i+1], d[i+2]) - mn;
                    if (mn > 230 && chroma < 25) {
                        d[i+3] = 0;
                    } else if (mn > 195 && chroma < 40) {
                        d[i+3] = Math.round(255 * (1 - ((mn - 195) / 35)));
                    }
                }
                offset = end;
                if (offset < total) {
                    requestAnimationFrame(processChunk);
                } else {
                    ctx.putImageData(imageData, 0, 0);
                    img.src = canvas.toDataURL('image/png');
                }
            }
            requestAnimationFrame(processChunk);
        }

        // ─── ROLE SELECTION ──────────────────────────
        function selectRole(el, role) {
            if (isAnimating) return;
            document.querySelectorAll('.spec-item').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            selectedRole = role;

            if (!_g()) return;

            gsap.fromTo(el, { scale: 1 }, { scale: 1.06, duration: 0.1, yoyo: true, repeat: 1 });
            gsap.to('#motoImg', { rotation: -2, x: 5, duration: 0.1, yoyo: true, repeat: 1, ease: 'power2.out' });
        }

        // ─── BUILD ELEMENTS ──────────────────────────
        function buildSpeedLines() {
            const c = document.getElementById('speedLines');
            for (let i = 0; i < 6; i++) {
                const l = document.createElement('div');
                l.className = 'speed-line';
                l.style.top = (15 + Math.random() * 70) + '%';
                l.style.width = (40 + Math.random() * 100) + 'px';
                c.appendChild(l);
            }
        }

        function buildExhaust() {
            const c = document.getElementById('exhaust');
            for (let i = 0; i < 5; i++) {
                const d = document.createElement('div');
                d.className = 'exhaust-dot';
                c.appendChild(d);
            }
        }

        // ─── LAUNCH MOTO ─────────────────────────────
        function launchMoto() {
            if (isAnimating) return;
            if (selectedRole === 'moto') {
                window.location.href = 'dashboard-motorizado.html';
                return;
            }

            isAnimating = true;
            if (!_g()) { showLoginScreen(); return; }

            const tl = gsap.timeline({
                onComplete: () => { showLoginScreen(); isAnimating = false; },
            });

            // Rev — tilt + vibrate
            tl.to('#motoImg', { rotation: -5, x: -8, duration: 0.15, ease: 'power2.out' })
              .to('#motoImg', { x: -6, duration: 0.04, yoyo: true, repeat: 4 })

            // Wheelie
              .to('#motoImg', { rotation: -6, y: -10, duration: 0.15, ease: 'power3.out' })

            // Exhaust burst
              .to('.exhaust-dot', {
                  x: () => -(30 + Math.random() * 60),
                  y: () => (Math.random() - 0.5) * 30,
                  opacity: 0.7, scale: 1 + Math.random(),
                  duration: 0.3, stagger: 0.03, ease: 'power2.out',
              }, '-=0.1')
              .to('.exhaust-dot', { opacity: 0, scale: 0, duration: 0.2 })

            // Speed lines
              .to('.speed-line', {
                  opacity: 0.6, x: -100,
                  duration: 0.25, stagger: 0.02, ease: 'power3.out',
              }, '-=0.3')

            // LAUNCH — moto flies right
              .to('#motoImg', {
                  x: window.innerWidth + 400, rotation: -2, scale: 0.9, y: 0,
                  duration: 0.5, ease: 'power4.in',
              }, '-=0.05')
              .to('.speed-line', {
                  x: window.innerWidth + 200, opacity: 0,
                  duration: 0.3, stagger: 0.02, ease: 'power2.in',
              }, '-=0.4')
              .to('#motoReflect', { x: window.innerWidth, opacity: 0, duration: 0.3 }, '-=0.3')
              .to('#motoHalo', { opacity: 0, duration: 0.2 }, '-=0.3')

            // UI fades
              .to(['#specsPanel', '#bottomInfo', '#brand', '#goBtn'], {
                  opacity: 0, duration: 0.2, ease: 'power2.in',
              }, '-=0.2')
              .to('#heroScreen', { opacity: 0, duration: 0.2 });
        }

        // ─── SHOW LOGIN ──────────────────────────────
        function showLoginScreen() {
            document.getElementById('heroScreen').style.display = 'none';
            const ls = document.getElementById('loginScreen');
            ls.classList.add('visible');

            if (selectedRole && DEMO[selectedRole]) {
                const d = DEMO[selectedRole];
                document.getElementById('email').value = d.email;
                document.getElementById('password').value = d.password;
                document.getElementById('roleTagText').textContent = d.label;
                document.getElementById('roleTag').classList.add('show');
            }

            if (!_g()) return;

            gsap.set('#loginContainer', { opacity: 0 });
            const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

            tl.fromTo('#loginContainer', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.45 })
              .fromTo('.login-brand', { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.3 }, '-=0.2')
              .fromTo(['.login-title', '.login-sub'], { y: 8, opacity: 0 }, { y: 0, opacity: 1, duration: 0.2, stagger: 0.05 }, '-=0.1')
              .fromTo('#loginCard', { y: 20, opacity: 0, scale: 0.97 }, { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.1)' }, '-=0.1')
              .fromTo('#loginCard .field', { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.2, stagger: 0.06 }, '-=0.15')
              .fromTo('.btn-login', { y: 8, opacity: 0 }, { y: 0, opacity: 1, duration: 0.2 }, '-=0.05');
        }

        // ─── GO BACK ─────────────────────────────────
        function goBack() {
            if (_g()) {
                gsap.to('#loginScreen', {
                    opacity: 0, duration: 0.3,
                    onComplete: () => {
                        const ls = document.getElementById('loginScreen');
                        ls.classList.remove('visible');
                        ls.style.opacity = '';

                        const hero = document.getElementById('heroScreen');
                        hero.style.display = 'flex';
                        hero.style.opacity = '1';
                        gsap.set('#motoImg', { x: 0, rotation: 0, scale: 1, y: 0 });
                        gsap.set('#motoReflect', { x: 0, opacity: 1 });
                        gsap.set('#motoHalo', { opacity: 0.3, scale: 1 });
                        gsap.set('.speed-line', { x: 0, opacity: 0 });
                        gsap.set(['#specsPanel', '#bottomInfo', '#brand', '#goBtn'], { opacity: 1 });

                        selectedRole = null;
                        document.querySelectorAll('.spec-item').forEach(s => s.classList.remove('active'));
                        document.getElementById('roleTag').classList.remove('show');

                        gsap.fromTo('#heroScreen', { opacity: 0 }, { opacity: 1, duration: 0.3 });
                        gsap.fromTo('#motoImg', { x: -60, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: 'back.out(1.2)' });
                    },
                });
            } else {
                document.getElementById('loginScreen').classList.remove('visible');
                document.getElementById('heroScreen').style.display = 'flex';
            }
        }

        // ─── INIT ────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            buildSpeedLines();
            buildExhaust();

            // Remove white BG — deferred so it doesn't block entrance animation
            const motoImg = document.getElementById('motoImg');
            const startBGRemoval = () => setTimeout(() => removeWhiteBG(motoImg), 1200);
            if (motoImg.complete) startBGRemoval();
            else motoImg.addEventListener('load', startBGRemoval);

            if (!_g()) return;

            // Force GPU layers on animated elements
            gsap.set('#motoImg, #motoHalo, .smoke', { force3D: true });

            // Initial hidden states
            gsap.set(['#brand', '#motoContainer', '#specsPanel', '#bottomInfo', '#goBtn'], { opacity: 0 });

            // ── ENTRANCE TIMELINE ──
            const tl = gsap.timeline({ defaults: { ease: 'power3.out' }, delay: 0.15 });

            tl.fromTo('#brand', { x: -20, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4 })
              .fromTo('#motoContainer',
                  { x: -120, opacity: 0, scale: 0.9 },
                  { x: 0, opacity: 1, scale: 1, duration: 0.65, ease: 'back.out(1.2)' },
              '-=0.15')
              .fromTo('.spec-item',
                  { x: 30, opacity: 0 },
                  { x: 0, opacity: 1, duration: 0.3, stagger: 0.08, ease: 'back.out(1.3)' },
              '-=0.25')
              .fromTo('#bottomInfo', { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.25 }, '-=0.15')
              .fromTo('#goBtn',
                  { scale: 0.7, opacity: 0 },
                  { scale: 1, opacity: 1, duration: 0.3, ease: 'back.out(1.5)' },
              '-=0.1');

            // ── AMBIENT (only 2 continuous tweens) ──
            gsap.to('#motoImg', { y: -6, duration: 2.5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1.5 });
            gsap.to('#motoHalo', { opacity: 0.15, duration: 3, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2 });

            // ── HOVER EFFECTS ──
            document.querySelectorAll('.spec-item').forEach(item => {
                item.addEventListener('mouseenter', () => gsap.to(item, { x: -6, duration: 0.2 }));
                item.addEventListener('mouseleave', () => {
                    if (!item.classList.contains('active')) gsap.to(item, { x: 0, duration: 0.2 });
                });
            });

            const go = document.getElementById('goBtn');
            go.addEventListener('mouseenter', () => gsap.to(go, { scale: 1.08, duration: 0.2 }));
            go.addEventListener('mouseleave', () => gsap.to(go, { scale: 1, duration: 0.2 }));

            const btn = document.querySelector('.btn-login');
            if (btn) {
                btn.addEventListener('mouseenter', () => gsap.to(btn, { y: -2, boxShadow: '0 8px 24px rgba(0,221,0,0.3)', duration: 0.2 }));
                btn.addEventListener('mouseleave', () => gsap.to(btn, { y: 0, boxShadow: 'none', duration: 0.2 }));
            }
        });

        // ─── LOGIN FORM ──────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const err = document.getElementById('errorMsg');
            err.classList.remove('show');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });

                const data = await res.json();

                if (!res.ok) {
                    err.textContent = data.error || 'Error al iniciar sesión';
                    err.classList.add('show');
                    if (_g()) gsap.fromTo(err, { x: -8 }, { x: 0, duration: 0.4, ease: 'elastic.out(1,0.3)' });
                    return;
                }

                localStorage.setItem('eli7e_token', data.token);
                localStorage.setItem('eli7e_user', JSON.stringify(data.user));

                if (_g()) {
                    gsap.to('#loginScreen', {
                        opacity: 0, scale: 1.02, duration: 0.3,
                        onComplete: () => {
                            window.location.href = DASHBOARD[data.user.rol] || 'dashboard-admin.html';
                        },
                    });
                } else {
                    window.location.href = DASHBOARD[data.user.rol] || 'dashboard-admin.html';
                }
            } catch {
                err.textContent = 'No se pudo conectar con el servidor';
                err.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
