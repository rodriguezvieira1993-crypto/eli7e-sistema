<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli7e — Acceso al Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --g1: #00DD00;
            --g2: #00BB00;
            --g3: #007700;
            --bg: #1C1C1C;
            --bg2: #242424;
            --text: #F0F0F0;
            --muted: #888888;
            --border: rgba(0, 221, 0, 0.15);
            --err: #FF4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════ */
        /*  SCREEN 1: HERO (MOTO SHOWCASE)            */
        /* ═══════════════════════════════════════════ */
        .hero-screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        /* Smoky atmospheric background */
        .hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 80% at 40% 50%, rgba(50, 50, 50, 0.6) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 70% 30%, rgba(60, 60, 60, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 20% 70%, rgba(40, 40, 40, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse 100% 40% at 50% 100%, rgba(0, 60, 0, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Floor gradient — subtle ground reflection */
        .floor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.3), transparent);
            pointer-events: none;
        }

        .floor::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            right: 5%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
        }

        /* Smoke wisps (CSS-only) */
        .smoke {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(80,80,80,0.15) 0%, transparent 70%);
            pointer-events: none;
            filter: blur(40px);
        }

        .smoke-1 { width: 500px; height: 300px; top: 20%; left: 15%; }
        .smoke-2 { width: 400px; height: 250px; top: 40%; right: 20%; }
        .smoke-3 { width: 350px; height: 200px; bottom: 25%; left: 35%; }

        /* ─── BRAND (top left) ─────────────────── */
        .brand {
            position: absolute;
            top: 32px;
            left: 40px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand img {
            height: 24px;
            opacity: 0.9;
        }

        .brand-text {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text);
        }

        .brand-text span {
            color: var(--g1);
        }

        /* ─── MOTORCYCLE (center) ──────────────── */
        .moto-container {
            position: relative;
            z-index: 3;
        }

        /* === REEMPLAZA ESTA IMAGEN ===
           Pon aquí un PNG de moto real con fondo transparente.
           Nombre sugerido: img/moto_hero.png
           Tamaño ideal: ~800x500px, fondo transparente */
        .moto-img {
            height: 360px;
            max-width: 90vw;
            object-fit: contain;
            filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.6));
            transform-origin: center bottom;
        }

        /* Green accent reflection under moto */
        .moto-reflect {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 30px;
            background: radial-gradient(ellipse, rgba(0, 221, 0, 0.08) 0%, transparent 70%);
            filter: blur(8px);
            pointer-events: none;
        }

        /* Speed lines */
        .speed-lines {
            position: absolute;
            top: 0; left: -200px; bottom: 0; width: 200px;
            pointer-events: none;
        }

        .speed-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, var(--g1), transparent);
            border-radius: 2px;
            opacity: 0;
            right: 0;
        }

        /* Exhaust */
        .exhaust {
            position: absolute;
            left: -10px;
            bottom: 30%;
            pointer-events: none;
        }

        .exhaust-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--g1);
            opacity: 0;
        }

        /* ─── SPECS PANEL (right side) ─────────── */
        .specs-panel {
            position: absolute;
            right: 56px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 32px;
            z-index: 5;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            padding: 6px 0;
        }

        .spec-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--g3);
            background: transparent;
            flex-shrink: 0;
            transition: all 0.3s;
            position: relative;
        }

        .spec-dot::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: transparent;
            transition: all 0.3s;
        }

        .spec-item:hover .spec-dot,
        .spec-item.active .spec-dot {
            border-color: var(--g1);
            box-shadow: 0 0 10px rgba(0, 221, 0, 0.3);
        }

        .spec-item.active .spec-dot::after {
            background: var(--g1);
        }

        .spec-val {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
            transition: color 0.3s;
        }

        .spec-item:hover .spec-val,
        .spec-item.active .spec-val {
            color: var(--g1);
        }

        .spec-lbl {
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* ─── BOTTOM LEFT ──────────────────────── */
        .bottom-info {
            position: absolute;
            bottom: 32px;
            left: 40px;
            z-index: 5;
        }

        .bottom-tagline {
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .social-dots {
            display: flex;
            gap: 12px;
        }

        .social-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
            opacity: 0.5;
            transition: all 0.2s;
            cursor: pointer;
        }

        .social-dot:hover {
            background: var(--g1);
            opacity: 1;
            box-shadow: 0 0 8px var(--g1);
        }

        /* ─── GO BUTTON (bottom right) ─────────── */
        .go-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 72px;
            height: 72px;
            background: var(--g1);
            color: #000;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
        }

        .go-btn:hover { background: #00FF00; }

        /* ═══════════════════════════════════════════ */
        /*  SCREEN 2: LOGIN                           */
        /* ═══════════════════════════════════════════ */
        .login-screen {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .login-screen.visible { display: flex; }

        .login-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 50% 50%, rgba(50,50,50,0.3) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 32px;
            border: none;
            background: none;
            font-family: inherit;
            transition: color 0.2s;
        }

        .back-btn:hover { color: var(--g1); }

        .back-arrow {
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .back-btn:hover .back-arrow { transform: translateX(-4px); }

        .login-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .login-brand img {
            height: 28px;
            opacity: 0.9;
        }

        .login-brand-name {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text);
        }

        .login-brand-name span { color: var(--g1); }

        .login-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-sub {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 24px;
        }

        .role-tag {
            display: none;
            align-items: center;
            gap: 6px;
            background: rgba(0, 221, 0, 0.06);
            border: 1px solid rgba(0, 221, 0, 0.15);
            border-radius: 999px;
            padding: 5px 14px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--g1);
            margin-bottom: 20px;
            width: fit-content;
        }

        .role-tag.show { display: inline-flex; }

        .login-card {
            background: rgba(28, 28, 28, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
        }

        .field { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: var(--g1);
            box-shadow: 0 0 0 3px rgba(0, 221, 0, 0.06);
        }

        input::placeholder { color: rgba(255,255,255,0.2); }

        .error-msg {
            background: rgba(255, 68, 68, 0.08);
            border: 1px solid rgba(255, 68, 68, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: var(--err);
            margin-bottom: 16px;
            display: none;
        }

        .error-msg.show { display: block; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--g1), var(--g3));
            color: #000;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .btn-login:hover::before { transform: translateX(100%); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .spinner { display: none; }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: inline; }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
        }

        /* ─── RESPONSIVE ───────────────────────── */

        /* Tablet landscape / pantallas medianas */
        @media (max-width: 1024px) {
            .moto-img { height: 280px; }
            .specs-panel { right: 30px; gap: 24px; }
            .spec-val { font-size: 0.95rem; }
            .go-btn { width: 64px; height: 64px; font-size: 1rem; }
        }

        /* Tablet portrait */
        @media (max-width: 768px) {
            .hero-screen {
                flex-direction: column;
                justify-content: center;
                gap: 0;
                padding: 60px 20px 20px;
            }
            .moto-img { height: 200px; }
            .moto-container { margin-bottom: 32px; }

            .specs-panel {
                position: static;
                transform: none;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 16px;
                margin-bottom: 24px;
            }
            .spec-lbl { display: none; }
            .spec-val { font-size: 0.9rem; }
            .spec-dot { width: 12px; height: 12px; }
            .spec-item { gap: 10px; padding: 8px 12px; }

            .bottom-info { display: none; }
            .go-btn {
                position: static;
                width: 64px; height: 64px;
                font-size: 1rem;
                margin: 0 auto;
                border-radius: 16px;
            }

            .login-container { max-width: 380px; padding: 20px; }
            .login-card { padding: 24px; }
            .login-title { font-size: 1.1rem; }
            .back-btn { margin-bottom: 24px; }
        }

        /* Móvil */
        @media (max-width: 480px) {
            .hero-screen {
                padding: 40px 16px 24px;
            }
            .moto-img { height: 160px; }
            .moto-container { margin-bottom: 28px; }

            .specs-panel {
                gap: 10px;
            }
            .spec-item {
                padding: 10px 14px;
                background: rgba(255,255,255,0.03);
                border: 1px solid rgba(0,221,0,0.1);
                border-radius: 10px;
            }
            .spec-val { font-size: 0.82rem; }
            .spec-dot { width: 10px; height: 10px; }

            .go-btn {
                width: 60px; height: 60px;
                font-size: 0.95rem;
                margin-top: 8px;
                border-radius: 14px;
            }

            .smoke { display: none; }
            .floor { height: 20%; }

            .login-screen { padding: 0 8px; }
            .login-container { max-width: 100%; padding: 16px; }
            .login-card { padding: 20px; border-radius: 16px; }
            .login-brand-name { font-size: 1.2rem; }
            .login-brand img { height: 22px; }
            .login-title { font-size: 1rem; }
            .login-sub { font-size: 0.75rem; margin-bottom: 18px; }
            .back-btn { margin-bottom: 20px; font-size: 0.78rem; }
            label { font-size: 0.68rem; }
            input { padding: 11px 14px; font-size: 0.85rem; border-radius: 10px; }
            .btn-login { padding: 12px; font-size: 0.9rem; border-radius: 10px; }
            .login-footer { font-size: 0.6rem; margin-top: 18px; }
            .role-tag { font-size: 0.7rem; padding: 4px 12px; }
        }

        /* Móvil pequeño (iPhone SE, etc) */
        @media (max-width: 360px) {
            .hero-screen { padding: 30px 12px 18px; }
            .moto-img { height: 130px; }
            .moto-container { margin-bottom: 20px; }
            .specs-panel { gap: 8px; }
            .spec-val { font-size: 0.75rem; }
            .spec-item { padding: 8px 10px; }
            .go-btn { width: 54px; height: 54px; font-size: 0.85rem; }
            .login-card { padding: 16px; }
            input { padding: 10px 12px; }
        }
    </style>
</head>

<body>

    <!-- ═══ SCREEN 1: HERO ═══════════════════════ -->
    <div class="hero-screen" id="heroScreen">
        <div class="hero-bg"></div>
        <div class="floor"></div>
        <div class="smoke smoke-1" id="smoke1"></div>
        <div class="smoke smoke-2" id="smoke2"></div>
        <div class="smoke smoke-3" id="smoke3"></div>

        <!-- Motorcycle center -->
        <div class="moto-container" id="motoContainer">
            <div class="speed-lines" id="speedLines"></div>
            <!--
              ⚠️ REEMPLAZAR con foto real de moto (PNG, fondo transparente)
              Ideal: 800x500px. Guardar como img/moto_hero.png
              Luego cambia el src abajo.
            -->
            <img src="img/eli7e_logo.png" class="moto-img" id="motoImg" alt="Moto">
            <div class="moto-reflect" id="motoReflect"></div>
            <div class="exhaust" id="exhaust"></div>
        </div>

        <!-- Specs = Roles (right side) -->
        <div class="specs-panel" id="specsPanel">
            <div class="spec-item" onclick="selectRole(this, 'admin')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Admin</div>
                    <div class="spec-lbl">ADMINISTRADOR</div>
                </div>
            </div>
            <div class="spec-item" onclick="selectRole(this, 'cc')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Call Center</div>
                    <div class="spec-lbl">OPERADOR</div>
                </div>
            </div>
            <div class="spec-item" onclick="selectRole(this, 'cont')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Contable</div>
                    <div class="spec-lbl">FINANZAS</div>
                </div>
            </div>
            <div class="spec-item" onclick="selectRole(this, 'moto')">
                <div class="spec-dot"></div>
                <div>
                    <div class="spec-val">Motorizados</div>
                    <div class="spec-lbl">CONDUCTORES</div>
                </div>
            </div>
        </div>

        <!-- Bottom left -->
        <div class="bottom-info" id="bottomInfo">
            <div class="bottom-tagline">Sistema de Gestión Operativa</div>
            <div class="social-dots">
                <div class="social-dot"></div>
                <div class="social-dot"></div>
                <div class="social-dot"></div>
                <div class="social-dot"></div>
            </div>
        </div>

        <!-- GO button -->
        <div class="go-btn" id="goBtn" onclick="launchMoto()">GO</div>
    </div>

    <!-- ═══ SCREEN 2: LOGIN ═════════════════════ -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container" id="loginContainer">

            <button class="back-btn" onclick="goBack()">
                <span class="back-arrow">←</span> Volver
            </button>

            <div class="login-brand">
                <img src="img/eli7e_logo.png" alt="">
                <div class="login-brand-name">ELI<span>7E</span></div>
            </div>

            <h2 class="login-title">Ingresa al sistema</h2>
            <p class="login-sub">Credenciales de acceso al centro de operaciones</p>

            <div class="role-tag" id="roleTag">
                <span style="color:var(--g1)">●</span> <span id="roleTagText"></span>
            </div>

            <div class="login-card" id="loginCard">
                <div class="error-msg" id="errorMsg"></div>
                <form id="loginForm">
                    <div class="field">
                        <label>Correo electrónico</label>
                        <input type="email" id="email" placeholder="usuario@eli7e.com" autocomplete="email" required>
                    </div>
                    <div class="field">
                        <label>Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn-login" id="btnLogin">
                        <span class="btn-text">Ingresar al Sistema</span>
                        <span class="spinner">Verificando...</span>
                    </button>
                </form>
            </div>

            <div class="login-footer">Eli7e © 2026 · Puerto Ordaz, Venezuela</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script>
        // ─── CONFIG ──────────────────────────────────
        const DEMO = {
            admin: { email: 'admin@eli7e.com', password: 'eli7e2026', label: 'Admin' },
            cc:    { email: 'callcenter@eli7e.com', password: 'eli7e2026', label: 'Call Center' },
            cont:  { email: 'contable@eli7e.com', password: 'eli7e2026', label: 'Contable' },
            moto:  { email: '', password: '', label: 'Motorizados', redirect: 'dashboard-motorizado.html' },
        };

        const DASHBOARD = {
            admin: 'dashboard-admin.html',
            call_center: 'dashboard-callcenter.html',
            contable: 'dashboard-contable.html',
        };

        let selectedRole = null;
        let isAnimating = false;

        // ─── HARLEY V-TWIN SOUND ENGINE (Web Audio) ─
        let _audioCtx = null;
        function _ctx() {
            if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (_audioCtx.state === 'suspended') _audioCtx.resume();
            return _audioCtx;
        }

        function _noise(ctx, dur) {
            const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
            const s = ctx.createBufferSource(); s.buffer = buf; return s;
        }

        // Distortion curve — da ese crunch de mufle pesado
        function _distortion(ctx, amount) {
            const ws = ctx.createWaveShaper();
            const n = 44100, curve = new Float32Array(n);
            for (let i = 0; i < n; i++) {
                const x = (i * 2) / n - 1;
                curve[i] = ((3 + amount) * x * 20 * (Math.PI / 180)) / (Math.PI + amount * Math.abs(x));
            }
            ws.curve = curve;
            ws.oversample = '4x';
            return ws;
        }

        // V-twin "potato-potato" — el sonido Harley con mufle
        function playIgnition() {
            try {
                const ctx = _ctx(), t = ctx.currentTime;
                const master = ctx.createGain();
                master.gain.setValueAtTime(0.25, t);
                master.gain.linearRampToValueAtTime(0.15, t + 0.5);
                master.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
                master.connect(ctx.destination);

                const dist = _distortion(ctx, 20);
                const lp = ctx.createBiquadFilter();
                lp.type = 'lowpass'; lp.frequency.value = 250; // mufle heavy
                dist.connect(lp).connect(master);

                // V-twin fundamental (~30Hz) — ese golpe grave
                const v1 = ctx.createOscillator();
                v1.type = 'sawtooth';
                v1.frequency.setValueAtTime(28, t);
                v1.frequency.linearRampToValueAtTime(38, t + 0.3);
                v1.frequency.linearRampToValueAtTime(30, t + 0.7);
                const v1g = ctx.createGain(); v1g.gain.value = 0.7;
                v1.connect(v1g).connect(dist);
                v1.start(t); v1.stop(t + 0.9);

                // Second cylinder — desfasado (el "potato" del V-twin)
                const v2 = ctx.createOscillator();
                v2.type = 'sawtooth';
                v2.frequency.setValueAtTime(28, t);
                v2.frequency.linearRampToValueAtTime(38, t + 0.3);
                v2.frequency.linearRampToValueAtTime(30, t + 0.7);
                const v2g = ctx.createGain(); v2g.gain.value = 0.5;
                v2.connect(v2g).connect(dist);
                v2.start(t + 0.018); v2.stop(t + 0.9); // 18ms offset = uneven firing

                // Sub bass punch — se siente en el pecho
                const sub = ctx.createOscillator();
                sub.type = 'sine';
                sub.frequency.value = 22;
                const subG = ctx.createGain();
                subG.gain.setValueAtTime(0.2, t);
                subG.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
                sub.connect(subG).connect(master);
                sub.start(t); sub.stop(t + 0.7);

                // Exhaust rumble noise — mufle
                const nz = _noise(ctx, 0.8);
                const nzG = ctx.createGain();
                const nzF = ctx.createBiquadFilter();
                nzF.type = 'lowpass'; nzF.frequency.value = 180;
                nzG.gain.setValueAtTime(0.06, t);
                nzG.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
                nz.connect(nzF).connect(nzG).connect(master);
                nz.start(t); nz.stop(t + 0.85);
            } catch(e) {}
        }

        // Arranque Harley: potato-potato acelera + rugido + whoosh
        function playLaunch() {
            try {
                const ctx = _ctx(), t = ctx.currentTime;
                const master = ctx.createGain();
                master.gain.setValueAtTime(0.22, t);
                master.gain.linearRampToValueAtTime(0.3, t + 0.6);
                master.gain.linearRampToValueAtTime(0.35, t + 1.2);
                master.gain.linearRampToValueAtTime(0.18, t + 1.8);
                master.gain.exponentialRampToValueAtTime(0.001, t + 2.3);
                master.connect(ctx.destination);

                const dist = _distortion(ctx, 25);
                const lp = ctx.createBiquadFilter();
                lp.type = 'lowpass';
                lp.frequency.setValueAtTime(220, t);
                lp.frequency.linearRampToValueAtTime(400, t + 1.0);
                lp.frequency.linearRampToValueAtTime(600, t + 1.5);
                lp.frequency.linearRampToValueAtTime(250, t + 2.2);
                dist.connect(lp).connect(master);

                // V-twin rev — frecuencia sube (RPM subiendo)
                const v1 = ctx.createOscillator();
                v1.type = 'sawtooth';
                v1.frequency.setValueAtTime(28, t);
                v1.frequency.exponentialRampToValueAtTime(45, t + 0.5);
                v1.frequency.exponentialRampToValueAtTime(80, t + 1.0);
                v1.frequency.exponentialRampToValueAtTime(140, t + 1.5);
                v1.frequency.exponentialRampToValueAtTime(200, t + 2.0);
                const v1g = ctx.createGain(); v1g.gain.value = 0.7;
                v1.connect(v1g).connect(dist);
                v1.start(t); v1.stop(t + 2.2);

                // Segundo cilindro
                const v2 = ctx.createOscillator();
                v2.type = 'sawtooth';
                v2.frequency.setValueAtTime(28, t);
                v2.frequency.exponentialRampToValueAtTime(45, t + 0.5);
                v2.frequency.exponentialRampToValueAtTime(80, t + 1.0);
                v2.frequency.exponentialRampToValueAtTime(140, t + 1.5);
                v2.frequency.exponentialRampToValueAtTime(200, t + 2.0);
                const v2g = ctx.createGain(); v2g.gain.value = 0.5;
                v2.connect(v2g).connect(dist);
                v2.start(t + 0.015); v2.stop(t + 2.2);

                // Tercer armónico — grit del escape
                const v3 = ctx.createOscillator();
                v3.type = 'square';
                v3.frequency.setValueAtTime(56, t);
                v3.frequency.exponentialRampToValueAtTime(160, t + 1.0);
                v3.frequency.exponentialRampToValueAtTime(280, t + 1.8);
                const v3g = ctx.createGain(); v3g.gain.value = 0.2;
                v3.connect(v3g).connect(dist);
                v3.start(t); v3.stop(t + 2.0);

                // Sub bass — vibra el piso
                const sub = ctx.createOscillator();
                sub.type = 'sine';
                sub.frequency.setValueAtTime(20, t);
                sub.frequency.exponentialRampToValueAtTime(50, t + 1.0);
                sub.frequency.exponentialRampToValueAtTime(80, t + 1.8);
                const subG = ctx.createGain();
                subG.gain.setValueAtTime(0.18, t);
                subG.gain.linearRampToValueAtTime(0.12, t + 1.2);
                subG.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
                sub.connect(subG).connect(master);
                sub.start(t); sub.stop(t + 2.0);

                // Exhaust rumble noise
                const nz = _noise(ctx, 2.2);
                const nzG = ctx.createGain();
                const nzF = ctx.createBiquadFilter();
                nzF.type = 'lowpass'; nzF.frequency.value = 300;
                nzF.frequency.linearRampToValueAtTime(500, t + 1.2);
                nzF.frequency.linearRampToValueAtTime(200, t + 2.0);
                nzG.gain.setValueAtTime(0.05, t);
                nzG.gain.linearRampToValueAtTime(0.1, t + 0.8);
                nzG.gain.linearRampToValueAtTime(0.08, t + 1.5);
                nzG.gain.exponentialRampToValueAtTime(0.001, t + 2.1);
                nz.connect(nzF).connect(nzG).connect(master);
                nz.start(t); nz.stop(t + 2.2);

                // Doppler fade — moto se aleja
                const dp = _noise(ctx, 0.8);
                const dpG = ctx.createGain();
                const dpF = ctx.createBiquadFilter();
                dpF.type = 'bandpass'; dpF.frequency.value = 150; dpF.Q.value = 2;
                dpG.gain.setValueAtTime(0, t + 1.5);
                dpG.gain.linearRampToValueAtTime(0.1, t + 1.7);
                dpG.gain.exponentialRampToValueAtTime(0.001, t + 2.2);
                dp.connect(dpF).connect(dpG).connect(master);
                dp.start(t + 1.5); dp.stop(t + 2.3);
            } catch(e) {}
        }

        // Auto-redirect if logged in
        const sesion = localStorage.getItem('eli7e_user');
        if (sesion) {
            const u = JSON.parse(sesion);
            if (DASHBOARD[u.rol]) window.location.href = DASHBOARD[u.rol];
        }

        // ─── ROLE SELECTION ──────────────────────────
        function selectRole(el, role) {
            if (isAnimating) return;
            document.querySelectorAll('.spec-item').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            selectedRole = role;
            playIgnition();

            if (typeof gsap !== 'undefined') {
                gsap.to(el, { scale: 1.05, duration: 0.12, yoyo: true, repeat: 1 });
                // Moto micro-rev
                gsap.to('#motoImg', {
                    rotation: -2, x: 5, duration: 0.12,
                    yoyo: true, repeat: 1, ease: 'power2.out',
                });
            }
        }

        // ─── BUILD PARTICLES ─────────────────────────
        function buildSpeedLines() {
            const c = document.getElementById('speedLines');
            for (let i = 0; i < 8; i++) {
                const l = document.createElement('div');
                l.className = 'speed-line';
                l.style.top = (15 + Math.random() * 70) + '%';
                l.style.width = (40 + Math.random() * 100) + 'px';
                c.appendChild(l);
            }
        }

        function buildExhaust() {
            const c = document.getElementById('exhaust');
            for (let i = 0; i < 6; i++) {
                const d = document.createElement('div');
                d.className = 'exhaust-dot';
                c.appendChild(d);
            }
        }

        // ─── LAUNCH MOTO ─────────────────────────────
        function launchMoto() {
            if (isAnimating) return;
            if (selectedRole === 'moto') {
                window.location.href = 'dashboard-motorizado.html';
                return;
            }

            isAnimating = true;
            playLaunch();

            if (typeof gsap === 'undefined') { showLoginScreen(); return; }

            const tl = gsap.timeline({
                onComplete: () => { showLoginScreen(); isAnimating = false; },
            });

            // 1. Rev — tilt forward + vibrate
            tl.to('#motoImg', { rotation: -5, x: -10, duration: 0.2, ease: 'power2.out' })
              .to('#motoImg', { x: -8, duration: 0.04, yoyo: true, repeat: 5 })

            // 2. Exhaust burst
              .to('.exhaust-dot', {
                  x: () => -(30 + Math.random() * 60),
                  y: () => (Math.random() - 0.5) * 30,
                  opacity: 0.7, scale: 1 + Math.random(),
                  duration: 0.3, stagger: 0.03, ease: 'power2.out',
              }, '-=0.15')
              .to('.exhaust-dot', { opacity: 0, scale: 0, duration: 0.2 })

            // 3. Speed lines
              .to('.speed-line', {
                  opacity: 0.5, x: -80,
                  duration: 0.3, stagger: 0.02, ease: 'power3.out',
              }, '-=0.3')

            // 4. LAUNCH — moto flies right
              .to('#motoImg', {
                  x: window.innerWidth + 400, rotation: -3, scale: 0.9,
                  duration: 0.55, ease: 'power3.in',
              }, '-=0.1')
              .to('.speed-line', {
                  x: window.innerWidth + 200, opacity: 0,
                  duration: 0.4, stagger: 0.02, ease: 'power2.in',
              }, '-=0.45')
              .to('#motoReflect', { x: window.innerWidth, opacity: 0, duration: 0.4 }, '-=0.4')

            // 5. UI fades
              .to(['#specsPanel', '#bottomInfo', '#goBtn'], {
                  opacity: 0, duration: 0.25, ease: 'power2.in',
              }, '-=0.3')
              .to('#heroScreen', { opacity: 0, duration: 0.25 });
        }

        // ─── SHOW LOGIN ──────────────────────────────
        function showLoginScreen() {
            document.getElementById('heroScreen').style.display = 'none';
            const ls = document.getElementById('loginScreen');
            ls.classList.add('visible');

            if (selectedRole && DEMO[selectedRole]) {
                const d = DEMO[selectedRole];
                document.getElementById('email').value = d.email;
                document.getElementById('password').value = d.password;
                document.getElementById('roleTagText').textContent = d.label;
                document.getElementById('roleTag').classList.add('show');
            }

            if (typeof gsap === 'undefined') return;

            gsap.set('#loginContainer', { opacity: 0 });
            const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

            tl.fromTo('#loginContainer', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.45 })
              .fromTo('.login-brand', { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.3 }, '-=0.2')
              .fromTo(['.login-title', '.login-sub'], { y: 8, opacity: 0 }, { y: 0, opacity: 1, duration: 0.2, stagger: 0.05 }, '-=0.1')
              .fromTo('#loginCard', { y: 20, opacity: 0, scale: 0.97 }, { y: 0, opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.1)' }, '-=0.1')
              .fromTo('#loginCard .field', { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.2, stagger: 0.06 }, '-=0.15')
              .fromTo('.btn-login', { y: 8, opacity: 0 }, { y: 0, opacity: 1, duration: 0.2 }, '-=0.05');
        }

        // ─── GO BACK ─────────────────────────────────
        function goBack() {
            if (typeof gsap !== 'undefined') {
                gsap.to('#loginScreen', {
                    opacity: 0, duration: 0.3,
                    onComplete: () => {
                        const ls = document.getElementById('loginScreen');
                        ls.classList.remove('visible');
                        ls.style.opacity = '';

                        const hero = document.getElementById('heroScreen');
                        hero.style.display = 'flex';
                        hero.style.opacity = '1';
                        gsap.set('#motoImg', { x: 0, rotation: 0, scale: 1 });
                        gsap.set('#motoReflect', { x: 0, opacity: 1 });
                        gsap.set('.speed-line', { x: 0, opacity: 0 });
                        gsap.set(['#specsPanel', '#bottomInfo', '#goBtn'], { opacity: 1 });

                        selectedRole = null;
                        document.querySelectorAll('.spec-item').forEach(s => s.classList.remove('active'));
                        document.getElementById('roleTag').classList.remove('show');

                        gsap.fromTo('#heroScreen', { opacity: 0 }, { opacity: 1, duration: 0.3 });
                        gsap.fromTo('#motoImg', { x: -60, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: 'back.out(1.2)' });
                    },
                });
            } else {
                document.getElementById('loginScreen').classList.remove('visible');
                document.getElementById('heroScreen').style.display = 'flex';
            }
        }

        // ─── INIT ────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            buildSpeedLines();
            buildExhaust();

            if (typeof gsap === 'undefined') return;

            // Initial states
            gsap.set(['#motoContainer', '.spec-item', '#bottomInfo', '#goBtn'], { opacity: 0 });

            const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

            tl.fromTo('#motoContainer', { x: -100, opacity: 0, scale: 0.88 }, { x: 0, opacity: 1, scale: 1, duration: 0.65, ease: 'back.out(1.1)' })
              .fromTo('.spec-item', { x: 30, opacity: 0 }, { x: 0, opacity: 1, duration: 0.3, stagger: 0.08, ease: 'back.out(1.2)' }, '-=0.25')
              .fromTo('#bottomInfo', { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.25 }, '-=0.15')
              .fromTo('#goBtn', { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.25, ease: 'back.out(1.4)' }, '-=0.1');

            // Continuous: float + smoke drift
            gsap.to('#motoImg', { y: -6, duration: 2.5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1.5 });
            gsap.to('#smoke1', { x: 30, y: -15, duration: 6, ease: 'sine.inOut', yoyo: true, repeat: -1 });
            gsap.to('#smoke2', { x: -20, y: 10, duration: 5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1 });
            gsap.to('#smoke3', { x: 15, y: -10, duration: 7, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 2 });

            // Hovers
            document.querySelectorAll('.spec-item').forEach(item => {
                item.addEventListener('mouseenter', () => gsap.to(item, { x: -6, duration: 0.2 }));
                item.addEventListener('mouseleave', () => {
                    if (!item.classList.contains('active')) gsap.to(item, { x: 0, duration: 0.2 });
                });
            });

            const go = document.getElementById('goBtn');
            go.addEventListener('mouseenter', () => gsap.to(go, { scale: 1.08, boxShadow: '0 0 30px rgba(0,221,0,0.4)', duration: 0.2 }));
            go.addEventListener('mouseleave', () => gsap.to(go, { scale: 1, boxShadow: 'none', duration: 0.2 }));

            const btn = document.querySelector('.btn-login');
            if (btn) {
                btn.addEventListener('mouseenter', () => gsap.to(btn, { y: -2, boxShadow: '0 8px 24px rgba(0,221,0,0.3)', duration: 0.2 }));
                btn.addEventListener('mouseleave', () => gsap.to(btn, { y: 0, boxShadow: 'none', duration: 0.2 }));
            }
        });

        // ─── LOGIN FORM ──────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const err = document.getElementById('errorMsg');
            err.classList.remove('show');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });

                const data = await res.json();

                if (!res.ok) {
                    err.textContent = data.error || 'Error al iniciar sesión';
                    err.classList.add('show');
                    if (typeof gsap !== 'undefined')
                        gsap.fromTo(err, { x: -8 }, { x: 0, duration: 0.4, ease: 'elastic.out(1,0.3)' });
                    return;
                }

                localStorage.setItem('eli7e_token', data.token);
                localStorage.setItem('eli7e_user', JSON.stringify(data.user));

                if (typeof gsap !== 'undefined') {
                    gsap.to('#loginScreen', {
                        opacity: 0, scale: 1.02, duration: 0.3,
                        onComplete: () => {
                            window.location.href = DASHBOARD[data.user.rol] || 'dashboard-admin.html';
                        },
                    });
                } else {
                    window.location.href = DASHBOARD[data.user.rol] || 'dashboard-admin.html';
                }
            } catch {
                err.textContent = 'No se pudo conectar con el servidor';
                err.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
